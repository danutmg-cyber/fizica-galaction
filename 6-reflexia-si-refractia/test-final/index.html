<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laborator Digital Optică</title>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#fbbf24;
--text:#f8fafc;
}

body{
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:700px;
background:var(--card);
padding:25px;
border-radius:15px;
}

h2{
text-align:center;
color:var(--accent);
}

input,button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
font-size:1.1rem;
}

button{
background:var(--accent);
border:none;
font-weight:bold;
cursor:pointer;
}

.progress{
height:10px;
background:#334155;
border-radius:10px;
margin:10px 0;
}

.progress-fill{
height:100%;
width:0%;
background:var(--accent);
border-radius:10px;
}

.learning{
background:#020617;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.feedback{
font-size:1.2rem;
font-weight:bold;
margin:10px 0;
}

.correct{color:#4ade80;}
.wrong{color:#f87171;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #334155;
padding:6px;
text-align:center;
}

</style>
</head>

<body>

<div class="container" id="login">

<h2>Laborator Digital Optică</h2>

<input id="name" placeholder="Nume elev">

<select id="cls">
<option value="">Clasa</option>
<option>VIII A</option>
<option>VIII B</option>
<option>VIII C</option>
</select>

<button onclick="start()">START</button>

</div>


<div class="container" id="game" style="display:none">

<div class="learning">

<b>Formule importante</b>

<br>

Reflexia: \(i=r\)

<br>

Refracția: \(n_1 \sin i = n_2 \sin r\)

<br>

Unghi limită: \( \sin l = \frac{n_2}{n_1} \)

<table>

<tr>
<th>Unghi</th>
<th>0°</th>
<th>30°</th>
<th>45°</th>
<th>60°</th>
<th>90°</th>
</tr>

<tr>
<td>sin</td>
<td>0</td>
<td>0.5</td>
<td>0.707</td>
<td>0.866</td>
<td>1</td>
</tr>

</table>

</div>

<div id="qinfo"></div>

<div class="progress">
<div class="progress-fill" id="bar"></div>
</div>

<h3 id="question"></h3>

<div id="input"></div>

<div class="feedback" id="feedback"></div>

<button id="next" onclick="next()" style="display:none">URMĂTOAREA</button>

</div>


<div class="container" id="end" style="display:none">

<h2>Rezultat final</h2>

<h1 id="score"></h1>

<div id="stats"></div>

<button onclick="location.reload()">Reia</button>

</div>


<script>

let state={
name:"",
cls:"",
idx:0,
correct:0,
questions:[]
}


function start(){

state.name=document.getElementById("name").value
state.cls=document.getElementById("cls").value

if(!state.name || !state.cls){

alert("Completează datele")

return

}

state.questions=generateQuestions()

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

show()

}



function generateQuestions(){

let q=[]


let angles=[30,45,60]

let sin={30:0.5,45:0.707,60:0.866}

for(let i of angles){

q.push({

q:`Dacă unghiul de incidență este ${i}°, unghiul de reflexie este ... grade.`,

a:[i],

exp:`Conform legii reflexiei: i = r`

})

}



q.push({

q:"Dacă unghiul dintre raza incidentă și cea reflectată este 80°, unghiul de incidență este ...",

a:["40"],

exp:"Unghiul dintre raze este 2i"

})


q.push({

q:"Aer (n=1) → Sticlă (n=√2). Dacă i=45°, unghiul r este ...",

a:["30"],

exp:"1·sin45 = √2·sin r → sin r = 0.5 → r=30°"

})


q.push({

q:"Aer (n=1) → Mediu (n=√3). Dacă i=60°, r este ...",

a:["30"],

exp:"sin60 / √3 = 0.5"

})


q.push({

q:"Diamant (n=2) → Aer (n=1). Unghiul limită este ...",

a:["30"],

exp:"sin l = 1/2"

})


q.push({

q:"Sticlă (n=√2) → Aer (n=1). Unghiul limită este ...",

a:["45"],

exp:"sin l = 1/√2"

})


return q.sort(()=>0.5-Math.random())

}



function show(){

let q=state.questions[state.idx]

document.getElementById("qinfo").innerText=`Întrebarea ${state.idx+1} / ${state.questions.length}`

document.getElementById("question").innerText=q.q

document.getElementById("input").innerHTML=

`<input id="ans"><button onclick="check()">Verifică</button>`

document.getElementById("feedback").innerText=""

document.getElementById("next").style.display="none"

let p=(state.idx/state.questions.length)*100

document.getElementById("bar").style.width=p+"%"

}



function check(){

let user=document.getElementById("ans").value.trim()

let q=state.questions[state.idx]

let ok=q.a.includes(user)

let f=document.getElementById("feedback")

if(ok){

state.correct++

f.innerHTML="✔ Corect!<br>"+q.exp

f.className="feedback correct"

}

else{

f.innerHTML="✘ Greșit.<br>Răspuns corect: "+q.a[0]+"<br>"+q.exp

f.className="feedback wrong"

}

document.getElementById("next").style.display="block"

}



function next(){

state.idx++

if(state.idx<state.questions.length)

show()

else

finish()

}



function finish(){

document.getElementById("game").style.display="none"

document.getElementById("end").style.display="block"

let p=Math.round(state.correct/state.questions.length*100)

let nota=(1+9*(state.correct/state.questions.length)).toFixed(2)

document.getElementById("score").innerText=nota

document.getElementById("stats").innerText=

`Corecte: ${state.correct} din ${state.questions.length} (${p}%)`

}

</script>

</body>
</html>
