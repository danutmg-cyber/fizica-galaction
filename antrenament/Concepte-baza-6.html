<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ - UNITĂȚI DE MĂSURĂ</title>
    <style>
        :root { --primary: #0284c7; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .header { text-align: center; width: 100%; max-width: 700px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .timer-bar { background: #334155; height: 10px; border-radius: 5px; width: 100%; margin: 10px 0; overflow: hidden; }
        #timer-progress { background: var(--accent); height: 100%; width: 100%; transition: width 1s linear; }
        .container { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .question-box { font-size: 1.25rem; font-weight: 500; margin-bottom: 15px; text-align: center; min-height: 80px; line-height: 1.4; }
        .instruction-box { font-size: 0.9rem; color: #fbbf24; text-align: center; margin-bottom: 10px; font-weight: bold; background: rgba(251, 191, 36, 0.1); padding: 8px; border-radius: 8px; }
        .option-btn { background: #2d3748; border: 2px solid #4a5568; padding: 14px; border-radius: 12px; cursor: pointer; color: white; font-size: 1rem; transition: 0.2s; width: 100%; margin-bottom: 10px; text-align: left; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #334155; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; background: #0f172a; color: white; font-size: 1.3rem; text-align: center; margin-bottom: 15px; }
        .check-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .next-btn { width: 100%; background: #059669; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.1rem; font-weight: bold; color: var(--accent);">🏫 ANTRENAMENT - UNITĂȚI DE MĂSURĂ</div>
        <div style="font-size: 0.9rem; color: #94a3b8;">TIMP RĂMAS: <span id="timer-text">40:00</span></div>
        <div class="timer-bar"><div id="timer-progress"></div></div>
    </div>

    <div class="container" id="screen-login">
        <h2 style="text-align:center;">📏 Transformări și Unități</h2>
        <p style="text-align:center; color:#94a3b8;">20 întrebări generate aleatoriu</p>
        <input type="text" id="p-name" placeholder="Numele tău">
        <select id="p-class" style="width:100%; padding:15px; margin: 15px 0; border-radius:12px; background:#0f172a; color:white; border: 2px solid #4a5568;">
            <option value="">Alege clasa...</option>
            <option value="6A">6A</option><option value="6B">6B</option><option value="6C">6C</option>
        </select>
        <button class="check-btn" onclick="startGame()">START GENERATOR</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="q-info" style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px;"></div>
        <div id="instruction" class="instruction-box">PENTRU ZECIMALE FOLOSEȘTE VIRGULA SAU PUNCTUL</div>
        <div class="question-box" id="question"></div>
        <div id="input-area"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">URMĂTOAREA ➡️</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center;">REZULTAT ANTRENAMENT</h2>
        <div style="font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center;" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">GENEREAZĂ ALTE VARIANTE</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec"; 
    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [], timeLeft: 2400 };
    let timerInterval;

    const theoryData = [
        { q: "Unitatea de măsură pentru lungime în S.I. este ...........", type: "fill", a: ["metrul", "metru"] },
        { q: "Instrumentul pentru măsurarea lungimii este ...........", type: "fill", a: ["rigla", "ruleta", "metru"] },
        { q: "Aria unei suprafețe se măsoară în ...........", type: "fill", a: ["metri patrati", "metru patrat"] },
        { q: "Simbolul pentru unitatea de măsură a volumului este ...........", type: "fill", a: ["m3", "m^3"] },
        { q: "Litrul este o unitate de măsură pentru ...........", type: "fill", a: ["volum", "capacitate"] },
        { q: "Unitatea de măsură pentru timp în S.I. este ...........", type: "fill", a: ["secunda"] },
        { q: "Un minut are ........... secunde.", type: "fill", a: ["60"] },
        { q: "Instrumentul pentru măsurarea timpului este ...........", type: "fill", a: ["cronometrul", "ceasul"] },
        { q: "Eroarea de măsurare poate fi cauzată de neatenția observatorului. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Multiplii metrului sunt kilometrul, hectometrul și decametrul. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" }
    ];

    function generateMathTransforms() {
        const units = ["mm", "cm", "dm", "m", "dam", "hm", "km"];
        const factors = [0.001, 0.01, 0.1, 1, 10, 100, 1000];
        let mathQ = [];

        for(let i=0; i<10; i++) {
            let fromIdx = Math.floor(Math.random() * units.length);
            let toIdx;
            do { toIdx = Math.floor(Math.random() * units.length); } while (fromIdx === toIdx);
            
            let val = (Math.random() * 50 + 1).toFixed(1);
            let result = (val * factors[fromIdx] / factors[toIdx]).toFixed(4);
            // Curățăm zerourile inutile de la finalul rezultatului
            result = parseFloat(result).toString();

            mathQ.push({
                q: `Transformă: ${val} ${units[fromIdx]} = ? ${units[toIdx]}`,
                type: "math",
                a: [result]
            });
        }
        return mathQ;
    }

    function startGame() {
        state.name = document.getElementById('p-name').value.trim();
        state.class = document.getElementById('p-class').value;
        if(!state.name || !state.class) return alert("Completează datele!");
        
        // Combinăm teoria cu matematica generată
        let mathPart = generateMathTransforms();
        state.questions = [...theoryData, ...mathPart].sort(() => 0.5 - Math.random());
        
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        timerInterval = setInterval(updateTimer, 1000);
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `ÎNTREBAREA ${state.currentIdx + 1} / 20`;
        document.getElementById('question').innerHTML = q.q;
        document.getElementById('instruction').style.display = (q.type === 'math') ? 'block' : 'none';
        
        const area = document.getElementById('input-area');
        area.innerHTML = '';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        if(q.type === 'choice') {
            q.o.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn'; b.innerText = opt;
                b.onclick = () => checkAns(opt);
                area.appendChild(b);
            });
        } else {
            area.innerHTML = `<input type="text" id="user-ans" placeholder="Scrie doar numărul..."><button class="check-btn" onclick="checkAns(document.getElementById('user-ans').value)">VERIFICĂ</button>`;
        }
    }

    function checkAns(user) {
        const q = state.questions[state.currentIdx];
        let isCorrect = false;

        if(q.type === 'math') {
            let userVal = user.replace(",", ".");
            isCorrect = (parseFloat(userVal) === parseFloat(q.a[0]));
        } else {
            const clean = (s) => s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            isCorrect = q.a.some(ans => clean(user) === clean(ans));
        }
        
        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(isCorrect) { 
            state.correctAnswers++; 
            f.innerText = "CORECT! ✅"; 
            f.style.color = "#4ade80"; 
        } else { 
            f.innerText = `GREȘIT! Răspuns corect: ${q.a[0]} ❌`; 
            f.style.color = "#f87171"; 
        }
        
        document.querySelectorAll('.option-btn, .check-btn').forEach(b => b.disabled = true);
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < 20) showQuestion(); else finishGame();
    }

    function updateTimer() {
        if (state.timeLeft <= 0) { clearInterval(timerInterval); finishGame(); return; }
        state.timeLeft--;
        const mins = Math.floor(state.timeLeft / 60);
        const secs = state.timeLeft % 60;
        document.getElementById('timer-text').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        document.getElementById('timer-progress').style.width = (state.timeLeft / 2400 * 100) + "%";
    }

    function finishGame() {
        clearInterval(timerInterval);
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const nota = (1 + (state.correctAnswers * 0.45)).toFixed(2);
        document.getElementById('final-score').innerText = nota > 10 ? "10.00" : nota;
        document.getElementById('raw-points').innerText = `Scor: ${state.correctAnswers} / 20 corecte.`;
        
        const fd = new FormData();
        fd.append("nume", state.name); 
        fd.append("clasa", state.class + " - Antrenament Unitati"); 
        fd.append("scor", nota);
        fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
    }
</script>
</body>
</html>
