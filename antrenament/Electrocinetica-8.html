<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ VIII - ELECTROCINETICĂ</title>
    <style>
        :root { --primary: #ffb703; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #ffb703; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .header { text-align: center; width: 100%; max-width: 750px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .container { width: 100%; max-width: 700px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        
        .learning-card { background: rgba(255, 183, 3, 0.1); border: 1px dashed var(--primary); border-radius: 12px; padding: 15px; margin-bottom: 20px; font-size: 0.85rem; line-height: 1.4; }
        .learning-card h4 { margin: 0 0 10px 0; color: var(--accent); text-align: center; font-size: 0.9rem; }
        .formula-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .question-box { font-size: 1.2rem; font-weight: 500; margin-bottom: 15px; text-align: center; min-height: 80px; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; background: #0f172a; color: white; font-size: 1.3rem; text-align: center; margin-bottom: 15px; }
        .check-btn { width: 100%; background: var(--primary); color: #0f172a; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .next-btn { width: 100%; background: #22c55e; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.1rem; font-weight: bold; color: var(--accent);">🔌 FIZICĂ VIII - CURENTUL ELECTRIC</div>
        <p style="font-size: 0.9rem; color: #94a3b8;">Circuite, Legile lui Ohm și Kirchhoff</p>
    </div>

    <div class="container" id="screen-login">
        <h2 style="text-align:center;">💡 Mișcarea Sarcinilor</h2>
        <input type="text" id="p-name" placeholder="Numele elevului">
        <select id="p-class" style="width:100%; padding:15px; margin: 15px 0; border-radius:12px; background:#0f172a; color:white; border: 2px solid #4a5568;">
            <option value="">Alege clasa...</option>
            <option value="8A">8A</option><option value="8B">8B</option><option value="8C">8C</option>
        </select>
        <button class="check-btn" onclick="startGame()">ÎNCEPE TESTUL</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div class="learning-card">
            <h4>📘 MEMO: ELECTRO-FORMULE</h4>
            <div class="formula-grid">
                <div>• Intensitate: <b>I = Q / t</b> (A)</div>
                <div>• Legea lui Ohm: <b>I = U / R</b></div>
                <div>• Rezistența: <b>R = ρ · l / S</b></div>
                <div>• Kirchhoff I: <b>Σ I_intrare = Σ I_ieșire</b></div>
            </div>
        </div>

        <div id="q-info" style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px;"></div>
        <div class="question-box" id="question"></div>
        <div id="input-area"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">URMĂTORUL PAS ➡️</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center;">PERFORMANȚĂ FINALĂ</h2>
        <div style="font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center;" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">REIA EXERSAREA</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec"; 
    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [] };

    function generateCircuitMath() {
        let qSet = [
            { q: "Aparatul folosit pentru măsurarea intensității curentului este ...........", type: "fill", a: ["ampermetrul"] },
            { q: "Ampermetrul se montează întotdeauna în ........... cu consumatorul.", type: "fill", a: ["serie"] },
            { q: "Viteza de deplasare a sarcinilor electrice se numește ........... curentului.", type: "fill", a: ["intensitatea"] },
            { q: "Materialele care nu permit trecerea curentului electric se numesc ...........", type: "fill", a: ["izolatoare", "izolatori"] }
        ];

        // 1. Legea lui Ohm: I = U / R
        let r1 = Math.floor(Math.random() * 20 + 5);
        let u1 = r1 * Math.floor(Math.random() * 5 + 1);
        let i1 = (u1 / r1).toFixed(1);
        qSet.push({ q: `La bornele unui rezistor R = ${r1} Ω se aplică o tensiune U = ${u1} V. Intensitatea curentului este I = ? A.`, type: "math", a: [i1.toString().replace(".",",")] });

        // 2. Intensitate: I = Q / t
        let q2 = Math.floor(Math.random() * 50 + 10);
        let t2 = Math.floor(Math.random() * 10 + 2);
        let i2 = (q2 / t2).toFixed(2);
        qSet.push({ q: `Prin secțiunea unui conductor trece o sarcină Q = ${q2} C în timpul t = ${t2} s. Intensitatea curentului este ? A.`, type: "math", a: [i2.toString().replace(".",",")] });

        // 3. Kirchhoff I (Nod de rețea)
        let in1 = Math.floor(Math.random() * 10 + 2);
        let in2 = Math.floor(Math.random() * 10 + 2);
        let out1 = Math.floor(Math.random() * 5 + 1);
        let out2 = (in1 + in2 - out1);
        qSet.push({ q: `Într-un nod de rețea intră curenții I1 = ${in1}A și I2 = ${in2}A. Dacă dintr-o ramură iese I3 = ${out1}A, ce curent I4 iese prin a doua ramură? (A)`, type: "math", a: [out2.toString()] });

        return qSet.sort(() => 0.5 - Math.random());
    }

    function startGame() {
        state.name = document.getElementById('p-name').value.trim();
        state.class = document.getElementById('p-class').value;
        if(!state.name || !state.class) return alert("Completează datele!");
        state.questions = generateCircuitMath();
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `CERINȚA ${state.currentIdx + 1} / ${state.questions.length}`;
        document.getElementById('question').innerText = q.q;
        const area = document.getElementById('input-area');
        area.innerHTML = `<input type="text" id="user-ans" placeholder="Răspuns...">
                          <button class="check-btn" onclick="checkAns(document.getElementById('user-ans').value)">VERIFICĂ</button>`;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAns(user) {
        const q = state.questions[state.currentIdx];
        const clean = (s) => s.toString().toLowerCase().trim().replace(",", ".");
        let isCorrect = false;

        if(q.type === "math") {
            isCorrect = Math.abs(parseFloat(clean(user)) - parseFloat(q.a[0].replace(",", "."))) < 0.05;
        } else {
            isCorrect = q.a.some(ans => clean(user) === clean(ans));
        }

        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(isCorrect) { state.correctAnswers++; f.innerText = "CORECT! ⚡"; f.style.color = "#4ade80"; }
        else { f.innerText = `GREȘIT! Răspuns corect: ${q.a[0]}`; f.style.color = "#f87171"; }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < state.questions.length) showQuestion(); else finishGame();
    }

    function finishGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const nota = (1 + (state.correctAnswers / state.questions.length) * 9).toFixed(2);
        document.getElementById('final-score').innerText = nota;
        document.getElementById('raw-points').innerText = `Scor: ${state.correctAnswers} / ${state.questions.length}`;
        
        const fd = new FormData();
        fd.append("nume", state.name); fd.append("clasa", state.class + " - Electrocinetica 8"); fd.append("scor", nota);
        fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
    }
</script>
</body>
</html>
