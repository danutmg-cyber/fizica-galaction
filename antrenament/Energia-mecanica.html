<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ - ENERGIA MECANICĂ</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/physics.png">
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --danger: #ef4444; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .header { text-align: center; width: 100%; max-width: 700px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .timer-bar { background: #334155; height: 10px; border-radius: 5px; width: 100%; margin: 10px 0; overflow: hidden; }
        #timer-progress { background: var(--accent); height: 100%; width: 100%; transition: width 1s linear; }
        .container { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .question-box { font-size: 1.2rem; font-weight: 500; margin-bottom: 10px; text-align: center; min-height: 60px; }
        .instruction-box { font-size: 0.95rem; color: #fbbf24; text-align: center; margin-bottom: 15px; font-weight: bold; display: none; background: rgba(251, 191, 36, 0.1); padding: 8px; border-radius: 8px; }
        .option-btn { background: #2d3748; border: 2px solid #4a5568; padding: 12px; border-radius: 12px; cursor: pointer; color: white; font-size: 1rem; transition: 0.2s; width: 100%; margin-bottom: 8px; text-align: left; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #334155; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; background: #0f172a; color: white; font-size: 1.2rem; text-align: center; margin-bottom: 10px; }
        .check-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .next-btn { width: 100%; background: #059669; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.1rem; font-weight: bold; color: var(--accent);">🏫 ȘCOALA GIMNAZIALĂ „GALA GALACTION”, MANGALIA</div>
        <div style="font-size: 0.9rem; color: #94a3b8;">TIMP RĂMAS: <span id="timer-text">50:00</span></div>
        <div class="timer-bar"><div id="timer-progress"></div></div>
    </div>

    <audio id="finish-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

    <div class="container" id="screen-login">
        <h2 style="text-align:center;">🚀 Energia Mecanică</h2>
        <p style="text-align:center; color:#94a3b8;">30 întrebări | Clasa a VII-a | g = 10 N/kg</p>
        <input type="text" id="p-name" placeholder="Numele tău complet">
        <select id="p-class" style="width:100%; padding:15px; margin: 15px 0; border-radius:12px; background:#0f172a; color:white; border: 2px solid #4a5568;">
            <option value="">Selectează clasa...</option>
            <option value="7A">Clasa a VII-a A</option><option value="7B">Clasa a VII-a B</option>
            <option value="7C">Clasa a VII-a C</option><option value="7D">Clasa a VII-a D</option>
        </select>
        <button class="check-btn" onclick="startGame()">START TEST</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="q-info" style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px;"></div>
        <div class="question-box" id="question"></div>
        <div id="instruction" class="instruction-box">📝 Calculează rezultatul corect (Joule)!</div>
        <div id="input-area"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">URMĂTOAREA ➡️</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center;">REZULTAT FINAL</h2>
        <div style="font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center;" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">REIA TESTUL ORI DE CÂTE ORI DOREȘTI. CU CÂT TE VEI ANTRENA MAI MULT CU ATÂT TE VEI APROPIA DE NOTA 10 LA TEST.</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzplptCcb7HDU8aOeaZTcUHPAG7g8H4PRJHZZ0_SP7iFk9l3Lbqtu0aIcZ6g_J87ZbYOQ/exec"; 
    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [], timeLeft: 3000 };
    let timerInterval;

    const theoryPool = [
        { q: "Energia cinetică (Ec) este energia unui corp aflat în stare de ...........", type: "fill", a: ["miscare"] },
        { q: "Energia potențială gravitațională (Epg) depinde de masa corpului și de ...........", type: "fill", a: ["inaltime"] },
        { q: "Unitatea de măsură pentru energie în S.I. este:", type: "choice", o: ["Joule (J)", "Watt (W)", "Newton (N)"], a: "Joule (J)" },
        { q: "Variația energiei cinetice este egală cu lucrul mecanic al tuturor forțelor ce acționează asupra corpului. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Energia mecanică (Em) este suma dintre Ec și ...........", type: "fill", a: ["Ep", "Energia potentiala"] },
        { q: "În absența forțelor de frecare, energia mecanică se conservă. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Variația energiei potențiale gravitaționale (ΔEpg) este egală cu lucrul mecanic al greutății luat cu semn opus. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Energia potențială elastică (Epe) depinde de pătratul deformației (Δl²). (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Dacă viteza unui corp se dublează, energia sa cinetică crește de 4 ori. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Lucrul mecanic efectuat de forțele neconservative (L_Fneconservative) este egal cu variația energiei mecanice. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "O bilă aflată în repaus la o anumită înălțime are energie cinetică zero. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Forța elastică este o forță conservativă. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Energia mecanică a unui sistem scade dacă acționează forțe de frecare. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Energia potențială gravitațională se măsoară față de un nivel de referință ales. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Când un corp cade liber, energia sa potențială se transformă în energie ...........", type: "fill", a: ["cinetica"] },
        { q: "Teorema de variație a energiei mecanice spune că ΔEm = L_Fneconservative. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Dacă un arc este comprimat, el înmagazinează energie ...........", type: "fill", a: ["potentiala elastica", "Epe"] },
        { q: "Greutatea este o forță neconservativă. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Fals" },
        { q: "L_Fconservative reprezintă lucrul mecanic al forțelor ...........", type: "fill", a: ["conservative"] },
        { q: "Relația matematică pentru Ec este (m · v²) / 2. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Relația matematică pentru Epg este m · g · h. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Unitatea de măsură Joule este echivalentă cu N · m. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Energia potențială elastică este nulă dacă deformația este nulă. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "La urcare, energia cinetică a unui corp aruncat vertical scade. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Suma energiilor unui sistem izolat rămâne constantă conform legii ........... energiei.", type: "fill", a: ["conservarii"] },
        { q: "Lucrul mecanic al forțelor de frecare este întotdeauna negativ. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "În punctul de maximă înălțime al unei aruncări, Em este egală cu Epg. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" }
    ];

    function generateMathProblems() {
        const p = [];
        // Problema 1: Ec
        let m1 = Math.floor(Math.random() * 10) + 2; // 2-12 kg
        let v1 = (Math.floor(Math.random() * 5) + 2) * 2; // viteza para pt calcul usor
        p.push({ q: `Calculați Ec pentru un corp cu m = ${m1} kg care se deplasează cu v = ${v1} m/s.`, type: "math", a: [(0.5 * m1 * v1 * v1).toString()] });

        // Problema 2: Epg
        let m2 = Math.floor(Math.random() * 20) + 5;
        let h2 = Math.floor(Math.random() * 10) + 2;
        p.push({ q: `Calculați Epg pentru un corp cu m = ${m2} kg aflat la h = ${h2} m (g = 10 N/kg).`, type: "math", a: [(m2 * 10 * h2).toString()] });

        // Problema 3: Epe
        let k3 = (Math.floor(Math.random() * 5) + 1) * 100; // 100-500 N/m
        let dl3 = 0.1; // 10 cm fix pt simplitate
        p.push({ q: `Calculați Epe pentru un arc cu k = ${k3} N/m deformat cu Δl = 0,1 m.`, type: "math", a: [(0.5 * k3 * dl3 * dl3).toString()] });

        // Problema 4: Conservare (Simplu)
        let h4 = 20;
        let m4 = 2;
        p.push({ q: `Un corp de ${m4} kg cade de la ${h4} m. Ce valoare are Ec în momentul impactului (fără frecare)?`, type: "math", a: [(m4 * 10 * h4).toString()] });

        return p;
    }

    function startGame() {
        state.name = document.getElementById('p-name').value.trim();
        state.class = document.getElementById('p-class').value;
        if(!state.name || !state.class) return alert("Introdu numele și clasa!");
        const maths = generateMathProblems();
        const theory = theoryPool.sort(() => 0.5 - Math.random()).slice(0, 26);
        state.questions = [...theory, ...maths].sort(() => 0.5 - Math.random());
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        timerInterval = setInterval(updateTimer, 1000);
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `ÎNTREBAREA ${state.currentIdx + 1} / 30`;
        document.getElementById('question').innerText = q.q;
        document.getElementById('instruction').style.display = (q.type === 'math') ? 'block' : 'none';
        const area = document.getElementById('input-area');
        area.innerHTML = '';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        if(q.type === 'choice') {
            const opts = q.o.includes("Adevărat") ? ["Adevărat", "Fals"] : q.o.sort(() => 0.5 - Math.random());
            opts.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn'; b.innerText = opt;
                b.onclick = () => checkAns(opt);
                area.appendChild(b);
            });
        } else {
            area.innerHTML = `<input type="text" id="user-ans" placeholder="Răspuns..."><button class="check-btn" onclick="checkAns(document.getElementById('user-ans').value)">VERIFICĂ</button>`;
        }
    }

    function checkAns(user) {
        const q = state.questions[state.currentIdx];
        let isCorrect = false;
        if (q.type === 'math') {
            const userNum = parseFloat(user.toString().replace(",", "."));
            const targetNum = parseFloat(q.a[0]);
            isCorrect = !isNaN(userNum) && Math.abs(userNum - targetNum) < 0.01;
        } else if (q.type === 'fill') {
            const clean = (s) => s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            isCorrect = q.a.some(ans => clean(user) === clean(ans));
        } else { isCorrect = user === q.a; }
        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(isCorrect) { state.correctAnswers++; f.innerText = "CORECT! ✅"; f.style.color = "#4ade80"; }
        else { f.innerText = `GREȘIT! Răspuns: ${Array.isArray(q.a) ? q.a[0] : q.a} ❌`; f.style.color = "#f87171"; }
        document.querySelectorAll('.option-btn, .check-btn').forEach(b => b.disabled = true);
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < 30) showQuestion(); else finishGame();
    }

    function updateTimer() {
        if (state.timeLeft <= 0) { clearInterval(timerInterval); finishGame(); return; }
        state.timeLeft--;
        const mins = Math.floor(state.timeLeft / 60);
        const secs = state.timeLeft % 60;
        document.getElementById('timer-text').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        document.getElementById('timer-progress').style.width = (state.timeLeft / 3000 * 100) + "%";
    }

    function finishGame() {
        clearInterval(timerInterval);
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const nota = (1 + (state.correctAnswers * 0.3)).toFixed(2);
        document.getElementById('final-score').innerText = nota > 10 ? "10.00" : nota;
        document.getElementById('raw-points').innerText = `Ai obținut ${state.correctAnswers} puncte din 30.`;
        document.getElementById('finish-sound').play().catch(() => {});
        const fd = new FormData();
        fd.append("nume", state.name); fd.append("clasa", state.class); fd.append("scor", nota);
        fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
    }
</script>
</body>
</html>
