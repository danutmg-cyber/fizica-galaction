<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ - FENOMENE OPTICE</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #a78bfa; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .header { text-align: center; width: 100%; max-width: 700px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .timer-bar { background: #334155; height: 10px; border-radius: 5px; width: 100%; margin: 10px 0; overflow: hidden; }
        #timer-progress { background: var(--accent); height: 100%; width: 100%; transition: width 1s linear; }
        .container { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .question-box { font-size: 1.25rem; font-weight: 500; margin-bottom: 15px; text-align: center; min-height: 80px; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; background: #0f172a; color: white; font-size: 1.3rem; text-align: center; margin-bottom: 15px; }
        .check-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .next-btn { width: 100%; background: #059669; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.1rem; font-weight: bold; color: var(--accent);">🔦 ANTRENAMENT - FENOMENE OPTICE</div>
        <div style="font-size: 0.9rem; color: #94a3b8;">TIMP RĂMAS: <span id="timer-text">40:00</span></div>
        <div class="timer-bar"><div id="timer-progress"></div></div>
    </div>

    <div class="container" id="screen-login">
        <h2 style="text-align:center;">🌟 Lumina și Culoarea</h2>
        <input type="text" id="p-name" placeholder="Numele tău">
        <select id="p-class" style="width:100%; padding:15px; margin: 15px 0; border-radius:12px; background:#0f172a; color:white; border: 2px solid #4a5568;">
            <option value="">Alege clasa...</option>
            <option value="6A">6A</option><option value="6B">6B</option><option value="6C">6C</option>
        </select>
        <button class="check-btn" onclick="startGame()">START ANTRENAMENT</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="q-info" style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px;"></div>
        <div class="question-box" id="question"></div>
        <div id="input-area"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">URMĂTORUL SUBIECT ➡️</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center;">EXERSARE FINALIZATĂ</h2>
        <div style="font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center;" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">REIA TESTUL</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec"; 
    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [], timeLeft: 2400 };
    let timerInterval;

    const theoryPool = [
        { q: "Corpurile care emit lumină se numesc ........... de lumină.", type: "fill", a: ["surse"] },
        { q: "Soarele este o sursă de lumină ...........", type: "fill", a: ["naturala"] },
        { q: "Becul și lumânarea aprinsă sunt surse ...........", type: "fill", a: ["artificiale"] },
        { q: "Lumina se propagă în linie ...........", type: "fill", a: ["dreapta"] },
        { q: "Corpurile care lasă lumina să treacă prin ele și permit vizualizarea obiectelor sunt ...........", type: "fill", a: ["transparente"] },
        { q: "Corpurile prin care lumina nu trece deloc se numesc ...........", type: "fill", a: ["opace"] },
        { q: "Spațiul întunecat din spatele unui corp opac luminat se numește ...........", type: "fill", a: ["umbra"] },
        { q: "Fenomenul de întoarcere a luminii în primul mediu, la suprafața de separare, se numește ...........", type: "fill", a: ["reflexie"] },
        { q: "Unghiul de incidență este egal cu unghiul de ...........", type: "fill", a: ["reflexie"] },
        { q: "Oglinda este un corp care reflectă lumina ...........", type: "fill", a: ["regulat"] },
        { q: "Lumina albă se descompune în cele șapte culori ale ...........", type: "fill", a: ["curcubeului"] },
        { q: "Viteza luminii în vid este de aproximativ 300.000 ........... pe secundă.", type: "fill", a: ["km", "kilometri"] }
    ];

    function startGame() {
        state.name = document.getElementById('p-name').value.trim();
        state.class = document.getElementById('p-class').value;
        if(!state.name || !state.class) return alert("Introdu numele și clasa!");
        
        state.questions = theoryPool.sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        timerInterval = setInterval(updateTimer, 1000);
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `ÎNTREBAREA ${state.currentIdx + 1} / 10`;
        document.getElementById('question').innerText = q.q;
        const area = document.getElementById('input-area');
        area.innerHTML = `<input type="text" id="user-ans" placeholder="Răspunsul tău...">
                          <button class="check-btn" onclick="checkAns(document.getElementById('user-ans').value)">VERIFICĂ</button>`;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAns(user) {
        const q = state.questions[state.currentIdx];
        const clean = (s) => s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        let isCorrect = q.a.some(ans => clean(user) === clean(ans));
        
        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(isCorrect) { state.correctAnswers++; f.innerText = "CORECT! 🌟"; f.style.color = "#4ade80"; }
        else { f.innerText = `MAI ÎNCEARCĂ! Răspunsul era: ${q.a[0]} ❌`; f.style.color = "#f87171"; }
        
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < 10) showQuestion(); else finishGame();
    }

    function updateTimer() {
        if (state.timeLeft <= 0) { finishGame(); return; }
        state.timeLeft--;
        const mins = Math.floor(state.timeLeft / 60);
        const secs = state.timeLeft % 60;
        document.getElementById('timer-text').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        document.getElementById('timer-progress').style.width = (state.timeLeft / 2400 * 100) + "%";
    }

    function finishGame() {
        clearInterval(timerInterval);
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const nota = (1 + (state.correctAnswers * 0.9)).toFixed(2);
        document.getElementById('final-score').innerText = nota;
        document.getElementById('raw-points').innerText = `Ai găsit ${state.correctAnswers} răspunsuri corecte din 10.`;
        
        const fd = new FormData();
        fd.append("nume", state.name); 
        fd.append("clasa", state.class + " - Optica 6"); 
        fd.append("scor", nota);
        fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
    }
</script>
</body>
</html>
