<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ VII - INTERACȚIUNI ȘI FORȚĂ</title>
    <style>
        :root { --primary: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #fbbf24; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .header { text-align: center; width: 100%; max-width: 700px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .container { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .question-box { font-size: 1.2rem; font-weight: 500; margin-bottom: 15px; text-align: center; min-height: 80px; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; background: #0f172a; color: white; font-size: 1.3rem; text-align: center; margin-bottom: 15px; }
        .check-btn { width: 100%; background: var(--primary); color: #0f172a; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .next-btn { width: 100%; background: #059669; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

     <div class="header">
        <div style="font-size: 1.1rem; font-weight: bold; color: var(--accent); margin-bottom: 2px;">
            ȘCOALA GIMNAZIALĂ "GALA GALACTION" MANGALIA
        </div>
        <div style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 12px; letter-spacing: 1px;">
            Prof. DĂNUȚ ANDRONIE
        </div>
        
        <div style="background: rgba(245, 158, 11, 0.1); border-left: 4px solid var(--accent); padding: 8px; margin-bottom: 15px; font-style: italic; color: #fef08a; font-size: 0.95rem;">
            "FIZICA NU ESTE DOMINATĂ DE FORMULE CI DE LOGICĂ"
        </div>

        <hr style="border: 0; border-top: 1px solid #334155; margin-bottom: 15px;">
    </div>

    <div class="container" id="screen-login">
        <h2 style="text-align:center;">🎯 Forța și Efectele ei</h2>
        <input type="text" id="p-name" placeholder="Numele elevului">
        <select id="p-class" style="width:100%; padding:15px; margin: 15px 0; border-radius:12px; background:#0f172a; color:white; border: 2px solid #4a5568;">
            <option value="">Alege clasa...</option>
            <option value="7A">7A</option><option value="7B">7B</option><option value="7C">7C</option>
        </select>
        <button class="check-btn" onclick="startGame()">START TEST</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="q-info" style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px;"></div>
        <div class="question-box" id="question"></div>
        <div id="input-area"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">URMĂTORUL SUBIECT ➡️</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center;">REZULTAT ANTRENAMENT</h2>
        <div style="font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center;" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">REIA CU ALTE EXERCIȚII</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec"; 
    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [] };

    const theoryPool = [
        { q: "Mărimea fizică vectorială care măsoară tăria interacțiunii se numește ...........", type: "fill", a: ["forta"] },
        { q: "Unitatea de măsură pentru forță în S.I. este ...........", type: "fill", a: ["newton", "n"] },
        { q: "Instrumentul folosit pentru măsurarea forței este ...........", type: "fill", a: ["dinamometrul"] },
        { q: "Efectul care constă în schimbarea stării de mișcare a unui corp se numește efect ...........", type: "fill", a: ["dinamic"] },
        { q: "Efectul care constă în deformarea unui corp se numește efect ...........", type: "fill", a: ["static"] },
        { q: "Interacțiunea care are loc fără contact direct se numește interacțiune la ...........", type: "fill", a: ["distanta"] },
        { q: "O forță este complet definită prin valoare numerică, direcție, sens și punct de ...........", type: "fill", a: ["aplicatie"] },
        { q: "Greutatea este forța cu care Pământul atrage un corp. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" }
    ];

    function generateForceMath() {
        let mathQ = [];
        // Probleme de rezultantă pentru forțe coliniare
        for(let i=0; i<4; i++) {
            let f1 = Math.floor(Math.random() * 20 + 5);
            let f2 = Math.floor(Math.random() * 15 + 2);
            let sameDir = Math.random() > 0.5;
            let res = sameDir ? (f1 + f2) : Math.abs(f1 - f2);
            let text = sameDir ? "același sens" : "sensuri opuse";
            mathQ.push({ q: `Două forțe F1 = ${f1} N și F2 = ${f2} N acționează pe aceeași direcție în ${text}. Rezultanta este ? N.`, type: "math", a: [res.toString()] });
        }
        return mathQ;
    }

    function startGame() {
        state.name = document.getElementById('p-name').value.trim();
        state.class = document.getElementById('p-class').value;
        if(!state.name || !state.class) return alert("Introdu datele!");
        
        state.questions = [...theoryPool, ...generateForceMath()].sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `ÎNTREBAREA ${state.currentIdx + 1} / 10`;
        document.getElementById('question').innerText = q.q;
        const area = document.getElementById('input-area');
        area.innerHTML = `<input type="text" id="user-ans" placeholder="Răspuns...">
                          <button class="check-btn" onclick="checkAns(document.getElementById('user-ans').value)">VERIFICĂ</button>`;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAns(user) {
        const q = state.questions[state.currentIdx];
        const clean = (s) => s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        let isCorrect = q.a.some(ans => clean(user) === clean(ans));
        
        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(isCorrect) { state.correctAnswers++; f.innerText = "CORECT! ✅"; f.style.color = "#4ade80"; }
        else { f.innerText = `GREȘIT! Răspuns corect: ${q.a[0]} ❌`; f.style.color = "#f87171"; }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < 10) showQuestion(); else finishGame();
    }

    function finishGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const nota = (1 + state.correctAnswers * 0.9).toFixed(2);
        document.getElementById('final-score').innerText = nota;
        document.getElementById('raw-points').innerText = `Ai răspuns corect la ${state.correctAnswers} din 10 întrebări.`;
        
        const fd = new FormData();
        fd.append("nume", state.name); fd.append("clasa", state.class + " - Interactiuni 7"); fd.append("scor", nota);
        fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
    }
</script>
</body>
</html>
