<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ VII - UNDE MECANICE</title>
    <style>
        :root { --primary: #ec4899; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #f472b6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .header { text-align: center; width: 100%; max-width: 700px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .container { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .question-box { font-size: 1.2rem; font-weight: 500; margin-bottom: 15px; text-align: center; min-height: 80px; }
        .instruction-box { font-size: 0.9rem; color: #fbbf24; text-align: center; margin-bottom: 10px; font-weight: bold; background: rgba(251, 191, 36, 0.1); padding: 8px; border-radius: 8px; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; background: #0f172a; color: white; font-size: 1.3rem; text-align: center; margin-bottom: 15px; }
        .check-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .next-btn { width: 100%; background: #059669; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.1rem; font-weight: bold; color: var(--accent);">🌊 FIZICĂ VII - UNDE MECANICE ȘI SUNETUL</div>
        <p style="font-size: 0.9rem; color: #94a3b8;">Oscilații, Unde și Acustică</p>
    </div>

    <div class="container" id="screen-login">
        <h2 style="text-align:center;">🎵 Fenomene Periodice</h2>
        <input type="text" id="p-name" placeholder="Numele elevului">
        <select id="p-class" style="width:100%; padding:15px; margin: 15px 0; border-radius:12px; background:#0f172a; color:white; border: 2px solid #4a5568;">
            <option value="">Alege clasa...</option>
            <option value="7A">7A</option><option value="7B">7B</option><option value="7C">7C</option>
        </select>
        <button class="check-btn" onclick="startGame()">START TEST</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="q-info" style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px;"></div>
        <div class="instruction-box">Atenție: T = 1/f. Viteza sunetului în aer ≈ 340 m/s.</div>
        <div class="question-box" id="question"></div>
        <div id="input-area"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">URMĂTOAREA ➡️</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center;">REZULTAT ANTRENAMENT</h2>
        <div style="font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center;" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">REIA CU ALTE VALORI</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec"; 
    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [] };

    const theoryPool = [
        { q: "Fenomenul de propagare a unei oscilații în spațiu se numește ........... mecanică.", type: "fill", a: ["unda"] },
        { q: "Timpul necesar pentru efectuarea unei oscilații complete se numește ...........", type: "fill", a: ["perioada"] },
        { q: "Numărul de oscilații efectuate într-o secundă se numește ...........", type: "fill", a: ["frecventa"] },
        { q: "Unitatea de măsură pentru frecvență în S.I. este ...........", type: "fill", a: ["hertz", "hz"] },
        { q: "Distanța parcursă de undă într-o perioadă se numește ........... de undă.", type: "fill", a: ["lungime"] },
        { q: "Sunetele cu frecvența sub 20 Hz se numesc ...........", type: "fill", a: ["infrasunete"] },
        { q: "Sunetele cu frecvența peste 20.000 Hz se numesc ...........", type: "fill", a: ["ultrasunete"] },
        { q: "Unda mecanică transportă energie, dar nu transportă ...........", type: "fill", a: ["substanta", "masa"] }
    ];

    function generateWaveMath() {
        let mathQ = [];
        // 1. Calcul Frecvență f = n/t
        for(let i=0; i<2; i++) {
            let n = Math.floor(Math.random() * 50 + 10) * 10;
            let t = Math.floor(Math.random() * 5 + 2);
            let f = (n / t).toFixed(1);
            mathQ.push({ q: `O sursă produce ${n} oscilații în ${t} secunde. Care este frecvența sursei? (Hz)`, type: "math", a: [f.toString().replace(".",",")] });
        }
        // 2. Calcul Viteza v = lambda * f
        for(let i=0; i<2; i++) {
            let f = Math.floor(Math.random() * 100 + 50);
            let lambda = Math.floor(Math.random() * 4 + 1);
            let v = f * lambda;
            mathQ.push({ q: `O undă are lungimea de undă λ = ${lambda} m și frecvența f = ${f} Hz. Viteza de propagare este ? m/s.`, type: "math", a: [v.toString()] });
        }
        // 3. Sunet (distanță d = v * t/2 pentru ecou sau d = v * t)
        for(let i=0; i<2; i++) {
            let t = Math.floor(Math.random() * 4 + 1);
            let dist = 340 * t;
            mathQ.push({ q: `Sunetul se propagă prin aer cu 340 m/s. Ce distanță parcurge în t = ${t} secunde? (m)`, type: "math", a: [dist.toString()] });
        }
        return mathQ;
    }

    function startGame() {
        state.name = document.getElementById('p-name').value.trim();
        state.class = document.getElementById('p-class').value;
        if(!state.name || !state.class) return alert("Completează datele!");
        state.questions = [...theoryPool, ...generateWaveMath()].sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `CERINȚA ${state.currentIdx + 1} / 10`;
        document.getElementById('question').innerText = q.q;
        const area = document.getElementById('input-area');
        area.innerHTML = `<input type="text" id="user-ans" placeholder="Răspuns...">
                          <button class="check-btn" onclick="checkAns(document.getElementById('user-ans').value)">VERIFICĂ</button>`;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAns(user) {
        const q = state.questions[state.currentIdx];
        const clean = (s) => s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(",", ".");
        let isCorrect = q.a.some(ans => clean(user) === clean(ans));
        
        if(q.type === "math") isCorrect = Math.abs(parseFloat(clean(user)) - parseFloat(clean(q.a[0]))) < 0.5;

        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(isCorrect) { state.correctAnswers++; f.innerText = "CORECT! 🌊"; f.style.color = "#4ade80"; }
        else { f.innerText = `MAI ÎNCEARCĂ! Răspuns: ${q.a[0]} ❌`; f.style.color = "#f87171"; }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < 10) showQuestion(); else finishGame();
    }

    function finishGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const nota = (1 + state.correctAnswers * 0.9).toFixed(2);
        document.getElementById('final-score').innerText = nota;
        document.getElementById('raw-points').innerText = `Scor: ${state.correctAnswers} / 10`;
        
        const fd = new FormData();
        fd.append("nume", state.name); fd.append("clasa", state.class + " - Unde 7"); fd.append("scor", nota);
        fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
    }
</script>
</body>
</html>
