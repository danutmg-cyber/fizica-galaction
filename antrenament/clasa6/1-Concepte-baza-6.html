<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ - CONCEPTE DE BAZĂ ȘI UNITĂȚI SI</title>
    <style>
        :root { --primary: #0284c7; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --success: #22c55e; --error: #ef4444; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .header { text-align: center; width: 100%; max-width: 800px; border-bottom: 2px solid var(--accent); margin-bottom: 30px; padding-bottom: 15px; }
        .container { width: 100%; max-width: 700px; background: var(--card); border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        input[type="text"], select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; background: #0f172a; color: white; font-size: 1.1rem; margin-bottom: 20px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent); }
        .question-box { font-size: 1.3rem; font-weight: 500; margin-bottom: 20px; text-align: center; line-height: 1.4; }
        .instruction-box { font-size: 0.9rem; color: #fbbf24; text-align: center; margin-bottom: 15px; font-weight: bold; background: rgba(251, 191, 36, 0.1); padding: 10px; border-radius: 8px; }
        .check-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; margin-bottom: 10px; }
        .next-btn { width: 100%; background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; display: none; text-transform: uppercase; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.4rem; font-weight: bold; margin-bottom: 5px;">ȘCOALA GIMNAZIALĂ "GALA GALACTION" MANGALIA</div>
        <div style="font-size: 1.1rem; color: #94a3b8; margin-bottom: 15px;">Prof. DĂNUȚ ANDRONIE</div>
        <div style="background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); padding: 10px; font-style: italic; color: var(--accent);">
            "FIZICA NU ESTE DOMINATĂ DE FORMULE CI DE LOGICĂ"
        </div>
    </div>

    <div class="container" id="screen-login">
        <h2 style="text-align:center;">📏 Evaluare: Concepte și Unități SI</h2>
        <input type="text" id="p-name" placeholder="Nume și Prenume Elev">
        <select id="p-class">
            <option value="">Alege clasa...</option>
            <option value="6A">Clasa a 6-a A</option>
            <option value="6B">Clasa a 6-a B</option>
            <option value="6C">Clasa a 6-a C</option>
            <option value="6D">Clasa a 6-a D</option>
        </select>
        <button class="check-btn" onclick="startGame()">ÎNCEPE TESTUL</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="q-info" style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 10px;"></div>
        <div id="instruction" class="instruction-box"></div>
        <div class="question-box" id="question"></div>
        <div id="input-area">
            <input type="text" id="user-ans" placeholder="Scrie rezultatul..." autocomplete="off">
            <button class="check-btn" id="submit-btn" onclick="processAnswer()">VERIFICĂ</button>
        </div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">URMĂTOAREA ÎNTREBARE ➔</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center;">REZULTAT FINAL</h2>
        <div style="font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center;" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">REIA TESTUL</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec"; 
    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [] };

    const theoryData = [
        // Instrumente de măsură
        { q: "Instrumentul de măsură pentru lungime este:", a: "rigla", instr: "Sistemul Internațional" },
        { q: "Instrumentul de măsură pentru masă este:", a: "balanta", instr: "Sistemul Internațional" },
        { q: "Instrumentul pentru măsurarea ariei unei figuri neregulate este:", a: "hirtia milimetrica", instr: "Sistemul Internațional" },
        { q: "Instrumentul de măsură pentru volumul lichidelor este:", a: "cilindrul gradat", instr: "Sistemul Internațional" },
        
        // Unități SI
        { q: "Unitatea de măsură în SI pentru distanță este:", a: "metrul", instr: "Sistemul Internațional" },
        { q: "Unitatea de măsură în SI pentru timp este:", a: "secunda", instr: "Sistemul Internațional" },
        { q: "Unitatea de măsură în SI pentru viteză este (simbol):", a: "m/s", instr: "Sistemul Internațional" },
        { q: "Unitatea de măsură în SI pentru arie este (simbol):", a: "m2", instr: "Sistemul Internațional" },
        { q: "Unitatea de măsură în SI pentru volum este (simbol):", a: "m3", instr: "Sistemul Internațional" },
        { q: "Unitatea de măsură în SI pentru masă este:", a: "kilogramul", instr: "Sistemul Internațional" },
        { q: "Unitatea de măsură în SI pentru temperatură este:", a: "kelvin", instr: "Sistemul Internațional" },
        { q: "Unitatea de măsură în SI pentru intensitatea curentului electric este:", a: "amperul", instr: "Sistemul Internațional" }
    ];

    function generateProblems() {
        const units = ["mm", "cm", "dm", "dam", "hm", "km"];
        const factors = { "mm": 0.001, "cm": 0.01, "dm": 0.1, "dam": 10, "hm": 100, "km": 1000 };
        let problems = [];

        // 4 Probleme de transformare strictă SI (fără rotunjire)
        for(let i=0; i<4; i++) {
            let u = units[Math.floor(Math.random() * units.length)];
            let val = (Math.random() * 95 + 1).toFixed(1);
            let res = (val * factors[u]).toString();
            problems.push({ q: `Transformă în SI: ${val} ${u} = ? m`, a: res, type: "math", instr: "TRANSFORMĂ ÎN SISTEMUL INTERNAȚIONAL (FĂRĂ ROTUNJIRE)" });
        }

        // 4 Probleme de diviziune (cu 2 zecimale)
        for(let i=0; i<4; i++) {
            let d = (Math.random() * 50 + 10).toFixed(0);
            let t = (Math.random() * 7 + 2).toFixed(0);
            let res = (d / t).toFixed(2);
            problems.push({ q: `Un corp parcurge d = ${d} m în t = ${t} s. Calculează viteza v = d/t:`, a: res, type: "div", instr: "REZULTATUL CU EXACT 2 ZECIMALE" });
        }
        return problems;
    }

    function startGame() {
        state.name = document.getElementById('p-name').value.trim();
        state.class = document.getElementById('p-class').value;
        if(!state.name || !state.class) return alert("Completează datele!");
        
        state.questions = [...theoryData, ...generateProblems()].sort(() => 0.5 - Math.random());
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `ÎNTREBAREA ${state.currentIdx + 1} / ${state.questions.length}`;
        document.getElementById('instruction').innerText = q.instr;
        document.getElementById('question').innerText = q.q;
        
        document.getElementById('user-ans').value = "";
        document.getElementById('user-ans').disabled = false;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('user-ans').focus();
    }

    function processAnswer() {
        const userRaw = document.getElementById('user-ans').value.trim().replace(",", ".");
        if(!userRaw) return;

        const q = state.questions[state.currentIdx];
        
        // Curățare diacritice pentru teorie
        const clean = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s/g, "");
        
        let isCorrect = false;
        if(q.type === "math" || q.type === "div") {
            isCorrect = (userRaw === q.a.replace(",", "."));
        } else {
            isCorrect = (clean(userRaw) === clean(q.a));
        }
        
        const f = document.getElementById('feedback');
        f.style.display = 'block';
        
        if(isCorrect) {
            state.correctAnswers++;
            f.innerHTML = "CORECT! ✅";
            f.style.color = "var(--success)";
            f.style.background = "rgba(34, 197, 94, 0.1)";
        } else {
            f.innerHTML = `GREȘIT! Răspuns corect: ${q.a} ❌`;
            f.style.color = "var(--error)";
            f.style.background = "rgba(239, 68, 68, 0.1)";
        }

        document.getElementById('user-ans').disabled = true;
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < state.questions.length) {
            showQuestion();
        } else {
            finishGame();
        }
    }

    function finishGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const nota = (1 + (state.correctAnswers * (9 / state.questions.length))).toFixed(2);
        document.getElementById('final-score').innerText = nota;
        document.getElementById('raw-points').innerText = `Ai rezolvat corect ${state.correctAnswers} din ${state.questions.length}.`;
        
        const fd = new FormData();
        fd.append("nume", state.name);
        fd.append("clasa", state.class + " - Concepte");
        fd.append("scor", nota);
        fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
    }

    document.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            if(document.getElementById('submit-btn').style.display !== 'none') processAnswer();
            else if(document.getElementById('next-btn').style.display !== 'none') nextQuestion();
        }
    });
</script>
</body>
</html>
