<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ - FENOMENE MECANICE</title>
    <style>
        :root { --primary: #0284c7; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; 
        }

        .header { 
            text-align: center; width: 100%; max-width: 800px; 
            border-bottom: 2px solid var(--accent); margin-bottom: 30px; padding-bottom: 15px; 
        }

        .container { 
            width: 100%; max-width: 700px; background: var(--card); 
            border-radius: 20px; padding: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; 
        }

        .question-box { font-size: 1.4rem; font-weight: 500; margin-bottom: 20px; text-align: center; min-height: 80px; line-height: 1.4; }
        .instruction-box { font-size: 0.9rem; color: #fbbf24; text-align: center; margin-bottom: 15px; font-weight: bold; background: rgba(251, 191, 36, 0.1); padding: 10px; border-radius: 8px; }
        
        input[type="text"], select { 
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; 
            background: #0f172a; color: white; font-size: 1.2rem; text-align: center; margin-bottom: 20px; outline: none;
        }

        .option-btn { background: #2d3748; border: 2px solid #4a5568; padding: 16px; border-radius: 12px; cursor: pointer; color: white; font-size: 1.1rem; transition: 0.2s; width: 100%; margin-bottom: 12px; text-align: left; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #334155; }
        
        .check-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        .check-btn:hover { filter: brightness(1.1); }

        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .next-btn { width: 100%; background: #059669; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        
        .hidden { display: none; }
        .timer-bar { background: #334155; height: 8px; border-radius: 4px; width: 100%; margin: 15px 0; overflow: hidden; }
        #timer-progress { background: var(--accent); height: 100%; width: 100%; transition: width 1s linear; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.3rem; font-weight: bold; color: white; margin-bottom: 5px;">
            ȘCOALA GIMNAZIALĂ "GALA GALACTION" MANGALIA
        </div>
        <div style="font-size: 1.1rem; color: #94a3b8; margin-bottom: 15px;">
            Prof. DĂNUȚ ANDRONIE
        </div>
        <div style="background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); padding: 10px; font-style: italic; color: var(--accent); font-size: 1rem; font-weight: 500;">
            "FIZICA NU ESTE DOMINATĂ DE FORMULE CI ESTE LOGICĂ"
        </div>
    </div>

    <div class="container" id="screen-login">
        <h2 style="text-align:center; margin-top:0;">🚗 Fenomene Mecanice</h2>
        <p style="text-align:center; color:#94a3b8; margin-bottom:25px;">Mișcare, Viteză, Densitate</p>
        
        <input type="text" id="p-name" placeholder="Nume și Prenume Elev">
        
        <select id="p-class">
            <option value="">Alege clasa...</option>
            <option value="A">Clasa A</option>
            <option value="B">Clasa B</option>
            <option value="C">Clasa C</option>
            <option value="D">Clasa D</option>
        </select>

        <button class="check-btn" onclick="startGame()">START ANTRENAMENT</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="q-info" style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px;"></div>
        <div class="timer-bar"><div id="timer-progress"></div></div>
        <div id="instruction" class="instruction-box">📝 CALCULEAZĂ ȘI INTRODU REZULTATUL</div>
        <div class="question-box" id="question"></div>
        <div id="input-area"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">URMĂTOAREA ➡️</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center;">REZULTAT ANTRENAMENT</h2>
        <div style="font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center; margin: 20px 0;" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8; font-size: 1.2rem;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">REIA CU ALTE CIFRE</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec"; 
    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [], timeLeft: 2700 };
    let timerInterval;

    const theoryPool = [
        { q: "Corpul față de care se determină starea de mișcare se numește corp de ...........", type: "fill", a: ["referinta"] },
        { q: "Linia descrisă de un corp în timpul mișcării se numește ...........", type: "fill", a: ["traiectorie"] },
        { q: "Dacă traiectoria este o dreaptă, mișcarea se numește ...........", type: "fill", a: ["rectilinie"] },
        { q: "Mișcarea și repausul sunt stări ........... (depind de corpul de referință).", type: "fill", a: ["relative"] },
        { q: "Un corp care își schimbă poziția față de corpul de referință este în ...........", type: "fill", a: ["miscare"] },
        { q: "Viteza medie este raportul dintre distanța parcursă și ...........", type: "fill", a: ["durata", "timp", "timpul"] },
        { q: "Densitatea este raportul dintre masă și ...........", type: "fill", a: ["volum"] },
        { q: "Instrumentul de măsură pentru masă este ...........", type: "fill", a: ["balanta", "cantarul"] },
        { q: "Traiectoria circulară are forma unui cerc. (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" },
        { q: "Viteza se măsoară în S.I. în metri pe secundă (m/s). (A/F)", type: "choice", o: ["Adevărat", "Fals"], a: "Adevărat" }
    ];

    function generateMath() {
        let mathQ = [];
        for(let i=0; i<5; i++) {
            let d = Math.floor(Math.random() * 200 + 10);
            let t = Math.floor(Math.random() * 10 + 2);
            let res = (d / t).toFixed(2);
            mathQ.push({ q: `Un mobil parcurge d = ${d} m în t = ${t} s. Viteza medie este ? m/s.`, type: "math", a: [parseFloat(res).toString().replace(".", ",")] });
        }
        for(let i=0; i<5; i++) {
            let m = Math.floor(Math.random() * 500 + 50);
            let V = Math.floor(Math.random() * 100 + 10);
            let res = (m / V).toFixed(2);
            mathQ.push({ q: `Un corp are masa m = ${m} g și volumul V = ${V} cm³. Densitatea este ? g/cm³.`, type: "math", a: [parseFloat(res).toString().replace(".", ",")] });
        }
        return mathQ;
    }

    function startGame() {
        state.name = document.getElementById('p-name').value.trim();
        state.class = document.getElementById('p-class').value;
        if(!state.name || !state.class) return alert("Vă rugăm să introduceți numele și să alegeți clasa!");
        
        state.questions = [...theoryPool, ...generateMath()].sort(() => 0.5 - Math.random()).slice(0, 15);
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        timerInterval = setInterval(updateTimer, 1000);
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `ÎNTREBAREA ${state.currentIdx + 1} / 15`;
        document.getElementById('question').innerText = q.q;
        document.getElementById('instruction').style.display = (q.type === 'math') ? 'block' : 'none';
        const area = document.getElementById('input-area');
        area.innerHTML = '';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        if(q.type === 'choice') {
            q.o.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn'; b.innerText = opt;
                b.onclick = () => checkAns(opt);
                area.appendChild(b);
            });
        } else {
            area.innerHTML = `<input type="text" id="user-ans" placeholder="Scrie rezultatul..."><button class="check-btn" onclick="checkAns(document.getElementById('user-ans').value)">VERIFICĂ</button>`;
        }
    }

    function checkAns(user) {
        if(!user && user !== 0) return alert("Introdu un răspuns!");
        const q = state.questions[state.currentIdx];
        let isCorrect = false;
        const clean = (s) => s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(",", ".");

        if(q.type === 'math') {
            let valUser = parseFloat(clean(user));
            let valCorrect = parseFloat(clean(q.a[0]));
            isCorrect = Math.abs(valUser - valCorrect) < 0.15;
        } else {
            isCorrect = q.a.some(ans => clean(user) === clean(ans));
        }
        
        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(isCorrect) { 
            state.correctAnswers++; 
            f.innerText = "CORECT! ✅"; f.style.color = "#4ade80"; f.style.background = "rgba(74, 222, 128, 0.1)";
        } else { 
            f.innerText = `GREȘIT! Răspuns: ${q.a[0]} ❌`; f.style.color = "#f87171"; f.style.background = "rgba(248, 113, 113, 0.1)";
        }
        document.querySelectorAll('.option-btn, .check-btn').forEach(b => b.disabled = true);
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < 15) showQuestion(); else finishGame();
    }

    function updateTimer() {
        if (state.timeLeft <= 0) { finishGame(); return; }
        state.timeLeft--;
        document.getElementById('timer-progress').style.width = (state.timeLeft / 2700 * 100) + "%";
    }

    function finishGame() {
        clearInterval(timerInterval);
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const nota = (1 + (state.correctAnswers * 0.6)).toFixed(2);
        document.getElementById('final-score').innerText = nota > 10 ? "10.00" : nota;
        document.getElementById('raw-points').innerText = `Ai rezolvat corect ${state.correctAnswers} întrebări din 15.`;
        
        const fd = new FormData();
        fd.append("nume", state.name); 
        fd.append("clasa", state.class + " - Mecanica 6"); 
        fd.append("scor", nota);
        fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' });
    }
</script>
</body>
</html>
