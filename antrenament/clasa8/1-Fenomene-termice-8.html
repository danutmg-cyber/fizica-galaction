<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FIZICĂ VIII - Fenomene termice</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #4ade80;
      --bad: #f87171;
      --border: #334155;
      --panel: rgba(15, 23, 42, 0.92);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      padding: 12px;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: none;
    }

    .screen.active { display: block; }

    .card {
      width: 100%;
      height: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      padding: 24px;
      overflow: auto;
    }

    .start-wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .school {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .teacher {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.6px;
    }

    .quote {
      color: #fef08a;
      font-style: italic;
      background: rgba(251, 191, 36, 0.10);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 10px 12px;
      display: inline-block;
      max-width: 100%;
    }

    .title {
      text-align: center;
      font-size: 1.8rem;
      margin: 0 0 8px;
    }

    .subtle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 340px);
      gap: 12px;
      margin-bottom: 14px;
    }

    input[type="text"], select {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid #475569;
      background: #0b1220;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 44px;
      background-image: linear-gradient(45deg, transparent 50%, #38bdf8 50%), linear-gradient(135deg, #38bdf8 50%, transparent 50%);
      background-position: calc(100% - 22px) calc(50% - 3px), calc(100% - 16px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      font-weight: 700;
    }

    select option {
      font-size: 1rem;
      white-space: normal;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .info-box {
      text-align: center;
      color: #fde68a;
      background: rgba(251, 191, 36, 0.10);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      font-weight: 700;
      line-height: 1.45;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .btn:hover { opacity: 0.96; }
    .btn:active { transform: scale(0.99); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--primary-dark); color: white; }
    .btn-disabled { opacity: 0.55; cursor: not-allowed; }

    .game-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .pill {
      background: rgba(14, 165, 233, 0.12);
      color: var(--accent);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 0.92rem;
    }

    .question-box {
      font-size: 1.38rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      margin: 8px auto 18px;
      max-width: 1050px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .answer-box {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .feedback {
      margin: 18px auto 0;
      padding: 14px;
      border-radius: 14px;
      display: none;
      text-align: center;
      font-weight: 700;
      line-height: 1.55;
      border: 1px solid transparent;
      max-width: 900px;
    }

    .feedback.ok {
      color: var(--ok);
      background: rgba(74, 222, 128, 0.08);
      border-color: rgba(74, 222, 128, 0.22);
    }

    .feedback.bad {
      color: #fecaca;
      background: rgba(248, 113, 113, 0.10);
      border-color: rgba(248, 113, 113, 0.22);
    }

    .result-score {
      font-size: 4.8rem;
      color: var(--accent);
      font-weight: 900;
      text-align: center;
      line-height: 1;
      margin: 24px 0 10px;
    }

    .center { text-align: center; }
    .muted { color: var(--muted); }
    .hidden { display: none; }

    @media (max-width: 760px) {
      .app { padding: 8px; }
      .card { padding: 16px; border-radius: 18px; }
      .grid { grid-template-columns: 1fr; }
      .question-box { font-size: 1.1rem; min-height: 100px; }
      .title { font-size: 1.45rem; }
      input[type="text"], select {
        min-height: 60px;
        font-size: 1.05rem;
      }
      select {
        padding-right: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="screen active" id="screen-login">
      <div class="card">
        <div class="start-wrap">
          <div class="header">
            <div class="school">ȘCOALA GIMNAZIALĂ ....</div>
            <div class="teacher">Prof. DĂNUȚ ANDRONIE</div>
            <div class="quote">FIZICA NU ESTE O MATERIE DOMINATĂ DE FORMULE CI DE LOGICĂ</div>
          </div>

          <h1 class="title">Fenomene termice</h1>
          <p class="subtle">Clasa a VIII-a • 20 itemi • 100 puncte • minimum 100 variante</p>

          <div class="grid">
            <input type="text" id="stdName" placeholder="Nume și prenume elev" autocomplete="name" />
            <select id="stdClass" aria-label="Selectează clasa">
              <option value="">Clasa...</option>
              <option value="CLASA a VIII-a A">CLASA a VIII-a A</option>
              <option value="CLASA a VIII-a B">CLASA a VIII-a B</option>
              <option value="CLASA a VIII-a C">CLASA a VIII-a C</option>
              <option value="CLASA a VIII-a D">CLASA a VIII-a D</option>
            </select>
          </div>

          <div class="info-box">Scrie numai valoarea numerică, cu maximum 2 zecimale.</div>

          <button class="btn btn-primary" id="startBtn">Începe testul</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-game">
      <div class="card game-card">
        <div>
          <div class="meta-row">
            <div class="pill" id="q-info">Cerința 1 / 20</div>
            <div class="pill" id="points-info">5 puncte</div>
            <div class="pill" id="variant-info">Varianta 1 / 100</div>
            <div class="pill" id="test-code">Cod test</div>
          </div>

          <div class="question-box" id="question"></div>
          <div class="answer-box" id="input-area"></div>
          <div class="feedback" id="feedback"></div>
        </div>

        <button class="btn btn-secondary hidden" id="nextBtn">Următoarea</button>
      </div>
    </section>

    <section class="screen" id="screen-end">
      <div class="card">
        <h2 class="title">Rezultat</h2>
        <div class="center muted" id="end-variant"></div>
        <div class="result-score" id="final-score"></div>
        <p class="center muted" id="raw-points"></p>
        <p class="center muted" id="final-grade"></p>
        <p class="center muted" id="end-code"></p>
        <button class="btn btn-primary" id="restartBtn">Reia testul</button>
      </div>
    </section>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec";
    const TOTAL_QUESTIONS = 20;
    const MIXED_COUNT = 10;
    const NUMERIC_COUNT = 10;
    const POINTS_PER_ITEM = 5;
    const TOTAL_POINTS = 100;
    const VARIANT_COUNT = 100;

    const C_ICE = 2100;
    const C_WATER = 4200;
    const C_STEAM = 2000;
    const L_FUSION = 330000;
    const L_VAPORIZATION = 2300000;

    const state = {
      name: "",
      className: "",
      correctAnswers: 0,
      currentIdx: 0,
      questions: [],
      variant: 1,
      testCode: "",
      seed: 0,
      sessionSalt: ""
    };

    const el = {
      login: document.getElementById("screen-login"),
      game: document.getElementById("screen-game"),
      end: document.getElementById("screen-end"),
      stdName: document.getElementById("stdName"),
      stdClass: document.getElementById("stdClass"),
      startBtn: document.getElementById("startBtn"),
      qInfo: document.getElementById("q-info"),
      pointsInfo: document.getElementById("points-info"),
      variantInfo: document.getElementById("variant-info"),
      testCode: document.getElementById("test-code"),
      question: document.getElementById("question"),
      inputArea: document.getElementById("input-area"),
      feedback: document.getElementById("feedback"),
      nextBtn: document.getElementById("nextBtn"),
      finalScore: document.getElementById("final-score"),
      rawPoints: document.getElementById("raw-points"),
      finalGrade: document.getElementById("final-grade"),
      endVariant: document.getElementById("end-variant"),
      endCode: document.getElementById("end-code"),
      restartBtn: document.getElementById("restartBtn")
    };

    const fillPool = [
      { q: "Căldura care produce numai modificarea temperaturii unui corp se numește căldură ..........", a: ["sensibilă", "sensibila"] },
      { q: "Căldura schimbată în timpul transformării de fază se numește căldură ..........", a: ["latentă", "latenta"] },
      { q: "Căldura specifică se notează cu litera ..........", a: ["c"] },
      { q: "Căldura latentă specifică de topire se notează, de obicei, cu ..........", a: ["lambda", "λ"] },
      { q: "Cantitatea de căldură schimbată la încălzirea unui corp se calculează cu relația Q = m · c · ..........", a: ["delta t", "Δt", "deltat", "t"] },
      { q: "În relația Q = m · λ, simbolul m reprezintă .......... corpului.", a: ["masa"] },
      { q: "Transformarea din solid în lichid se numește ..........", a: ["topire"] },
      { q: "Transformarea din lichid în vapori se numește ..........", a: ["vaporizare"] },
      { q: "Apa aflată la 0 °C poate coexista cu gheața aflată tot la 0 °C în timpul procesului de ..........", a: ["topire"] },
      { q: "În timpul topirii, temperatura unei substanțe pure rămâne ..........", a: ["constantă", "constanta"] },
      { q: "Coeficientul caloric care arată energia necesară pentru 1 kg de substanță la schimbarea stării de agregare se numește căldură latentă ..........", a: ["specifică", "specifica"] },
      { q: "Unitatea de măsură pentru căldura specifică este J/(kg·..........)", a: ["k", "°c", "c"] },
      { q: "Unitatea de măsură pentru căldura latentă specifică este J/..........", a: ["kg"] },
      { q: "La aceeași masă și aceeași variație de temperatură, corpul cu căldura specifică mai mare schimbă o cantitate de căldură mai ..........", a: ["mare"] },
      { q: "Pentru vaporizare se folosește relația Q = m · ..........", a: ["l", "lv", "r"] },
      { q: "Dacă un corp cedează căldură, temperatura lui poate să ..........", a: ["scadă", "scada"] }
    ];

    const tfPool = [
      { q: "Căldura latentă schimbată în timpul topirii modifică starea de agregare, nu temperatura.", a: ["adevărat", "adevarat"] },
      { q: "În timpul topirii gheții, temperatura crește continuu peste 0 °C.", a: ["fals"] },
      { q: "Căldura specifică depinde de natura substanței.", a: ["adevărat", "adevarat"] },
      { q: "Pentru aceeași masă și aceeași variație de temperatură, aluminiul și apa schimbă aceeași cantitate de căldură.", a: ["fals"] },
      { q: "Vaporizarea este transformarea din lichid în gaz.", a: ["adevărat", "adevarat"] },
      { q: "Solidificarea este transformarea din lichid în solid.", a: ["adevărat", "adevarat"] },
      { q: "Căldura sensibilă se calculează cu relația Q = m · c · Δt.", a: ["adevărat", "adevarat"] },
      { q: "Sunetul și căldura latentă sunt același lucru.", a: ["fals"] },
      { q: "Pentru topirea unei mase mai mari de gheață este necesară o cantitate de căldură mai mare.", a: ["adevărat", "adevarat"] },
      { q: "Dacă temperatura nu se schimbă, este imposibil să existe schimb de căldură.", a: ["fals"] },
      { q: "La vaporizare, o substanță primește căldură latentă.", a: ["adevărat", "adevarat"] },
      { q: "Căldura latentă specifică de topire și căldura latentă specifică de vaporizare au aceeași valoare pentru orice substanță.", a: ["fals"] }
    ];

    function normalizeText(value) {
      return String(value)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeNumberString(value) {
      return String(value).trim().replace(/,/g, ".").replace(/\s+/g, "");
    }

    function parseLocaleNumber(value) {
      const cleaned = normalizeNumberString(value);
      if (!/^[-+]?\d+(\.\d+)?$/.test(cleaned)) return NaN;
      return Number(cleaned);
    }

    function decimalCount(value) {
      const cleaned = normalizeNumberString(value);
      return cleaned.includes(".") ? cleaned.split(".")[1].length : 0;
    }

    function truncateTo(num, decimals = 2) {
      const factor = Math.pow(10, decimals);
      return Math.trunc(num * factor) / factor;
    }

    function roundTo(num, decimals = 2) {
      const factor = Math.pow(10, decimals);
      return Math.round(num * factor) / factor;
    }

    function formatNumber(num, maxDecimals = 2) {
      if (Number.isInteger(num)) return String(num);
      return Number(num.toFixed(maxDecimals)).toString();
    }

    function formatPrecise(num) {
      if (Number.isInteger(num)) return String(num);
      return Number(num.toFixed(4)).toString();
    }

    function shortCode(seed) {
      return (seed >>> 0).toString(36).toUpperCase().slice(0, 6);
    }

    function hashString(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(a) {
      return function () {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randInt(rng, min, max) {
      return Math.floor(rng() * (max - min + 1)) + min;
    }

    function randFrom(rng, arr) {
      return arr[Math.floor(rng() * arr.length)];
    }

    function pickUnique(rng, pool, count) {
      const copy = [...pool];
      const result = [];
      while (result.length < count && copy.length) {
        const idx = Math.floor(rng() * copy.length);
        result.push(copy.splice(idx, 1)[0]);
      }
      return result;
    }

    function shuffleArray(rng, arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function questionFill(item) {
      return { type: "fill", q: item.q, answers: item.a, points: POINTS_PER_ITEM };
    }

    function questionTrueFalse(item) {
      return { type: "tf", q: item.q, answers: item.a, points: POINTS_PER_ITEM };
    }

    function questionNumeric({ q, exactAnswer, unit = "", formula = "" }) {
      return {
        type: "numeric",
        q,
        exactAnswer,
        unit,
        formula,
        points: POINTS_PER_ITEM,
        displayAnswer: `${formatPrecise(exactAnswer)}${unit ? " " + unit : ""}`
      };
    }

    function genHeatWater(rng) {
      const mass = randFrom(rng, [0.1, 0.2, 0.25, 0.5, 0.75, 1, 1.2, 1.5, 2]);
      const dt = randInt(rng, 10, 60);
      return questionNumeric({
        q: `Calculează căldura necesară pentru a încălzi ${formatNumber(mass)} kg de apă cu ${dt} °C.`,
        exactAnswer: mass * C_WATER * dt,
        unit: "J",
        formula: "Q = m · c_apă · Δt"
      });
    }

    function genHeatIce(rng) {
      const mass = randFrom(rng, [0.1, 0.2, 0.25, 0.4, 0.5, 0.75, 1]);
      const t1 = randFrom(rng, [-30, -25, -20, -15, -10, -5]);
      return questionNumeric({
        q: `Calculează căldura necesară pentru a încălzi ${formatNumber(mass)} kg de gheață de la ${t1} °C la 0 °C.`,
        exactAnswer: mass * C_ICE * (0 - t1),
        unit: "J",
        formula: "Q = m · c_gheață · Δt"
      });
    }

    function genFusionHeat(rng) {
      const mass = randFrom(rng, [0.1, 0.15, 0.2, 0.25, 0.4, 0.5, 0.75, 1]);
      return questionNumeric({
        q: `Calculează căldura necesară pentru topirea a ${formatNumber(mass)} kg de gheață aflată la 0 °C.`,
        exactAnswer: mass * L_FUSION,
        unit: "J",
        formula: "Q = m · λ"
      });
    }

    function genVaporizationHeat(rng) {
      const mass = randFrom(rng, [0.1, 0.15, 0.2, 0.25, 0.3, 0.5, 0.75]);
      return questionNumeric({
        q: `Calculează căldura necesară pentru vaporizarea a ${formatNumber(mass)} kg de apă aflată la 100 °C.`,
        exactAnswer: mass * L_VAPORIZATION,
        unit: "J",
        formula: "Q = m · L_v"
      });
    }

    function genMassFromHeatWater(rng) {
      const mass = randFrom(rng, [0.2, 0.25, 0.5, 0.75, 1, 1.5]);
      const dt = randInt(rng, 10, 50);
      const Q = mass * C_WATER * dt;
      return questionNumeric({
        q: `Ce masă de apă poate fi încălzită cu ${Q} J dacă temperatura crește cu ${dt} °C?`,
        exactAnswer: Q / (C_WATER * dt),
        unit: "kg",
        formula: "m = Q / (c_apă · Δt)"
      });
    }

    function genDeltaTWater(rng) {
      const mass = randFrom(rng, [0.1, 0.2, 0.25, 0.5, 0.75, 1]);
      const dt = randInt(rng, 10, 60);
      const Q = mass * C_WATER * dt;
      return questionNumeric({
        q: `Cu ${Q} J se încălzesc ${formatNumber(mass)} kg de apă. Calculează variația de temperatură.`,
        exactAnswer: Q / (mass * C_WATER),
        unit: "°C",
        formula: "Δt = Q / (m · c_apă)"
      });
    }

    function genThermalCapacity(rng) {
      const mass = randFrom(rng, [0.2, 0.25, 0.5, 0.75, 1, 1.2, 1.5]);
      return questionNumeric({
        q: `Calculează capacitatea calorică a unei mase de ${formatNumber(mass)} kg de apă.`,
        exactAnswer: mass * C_WATER,
        unit: "J/°C",
        formula: "C = m · c"
      });
    }

    function genHeatFromCapacity(rng) {
      const C = randFrom(rng, [420, 840, 1050, 1680, 2100, 2520, 4200]);
      const dt = randInt(rng, 10, 50);
      return questionNumeric({
        q: `Un corp are capacitatea calorică C = ${C} J/°C. Ce căldură schimbă la o variație de temperatură de ${dt} °C?`,
        exactAnswer: C * dt,
        unit: "J",
        formula: "Q = C · Δt"
      });
    }

    function genIceToWaterAboveZero(rng) {
      const mass = randFrom(rng, [0.1, 0.2, 0.25, 0.5, 0.75, 1]);
      const t1 = randFrom(rng, [-20, -15, -10, -5]);
      const t2 = randFrom(rng, [10, 20, 25, 30, 40]);
      const q1 = mass * C_ICE * (0 - t1);
      const q2 = mass * L_FUSION;
      const q3 = mass * C_WATER * t2;
      return questionNumeric({
        q: `Calculează căldura necesară pentru a transforma ${formatNumber(mass)} kg de gheață de la ${t1} °C în apă la ${t2} °C.`,
        exactAnswer: q1 + q2 + q3,
        unit: "J",
        formula: "Q = m·c_gheață·Δt₁ + m·λ + m·c_apă·Δt₂"
      });
    }

    function genWaterToSteam(rng) {
      const mass = randFrom(rng, [0.1, 0.2, 0.25, 0.5, 0.75]);
      const t1 = randFrom(rng, [10, 20, 25, 30, 40]);
      const q1 = mass * C_WATER * (100 - t1);
      const q2 = mass * L_VAPORIZATION;
      return questionNumeric({
        q: `Calculează căldura necesară pentru a transforma ${formatNumber(mass)} kg de apă de la ${t1} °C în vapori la 100 °C.`,
        exactAnswer: q1 + q2,
        unit: "J",
        formula: "Q = m·c_apă·Δt + m·L_v"
      });
    }

    function genComplexIceToVapor(rng) {
      const mass = randFrom(rng, [0.1, 0.2, 0.25, 0.5, 0.75]);
      const tIce = randFrom(rng, [-20, -15, -10, -5]);
      const q1 = mass * C_ICE * (0 - tIce);
      const q2 = mass * L_FUSION;
      const q3 = mass * C_WATER * 100;
      const q4 = mass * L_VAPORIZATION;
      return questionNumeric({
        q: `Problemă complexă: calculează căldura totală necesară pentru a transforma ${formatNumber(mass)} kg de gheață aflată la ${tIce} °C în vapori de apă la 100 °C.`,
        exactAnswer: q1 + q2 + q3 + q4,
        unit: "J",
        formula: "Q = m·c_gheață·Δt₁ + m·λ + m·c_apă·Δt₂ + m·L_v"
      });
    }

    const numericGenerators = [
      genHeatWater,
      genHeatIce,
      genFusionHeat,
      genVaporizationHeat,
      genMassFromHeatWater,
      genDeltaTWater,
      genThermalCapacity,
      genHeatFromCapacity,
      genIceToWaterAboveZero,
      genWaterToSteam
    ];

    function generateSessionSalt() {
      if (window.crypto && window.crypto.getRandomValues) {
        const arr = new Uint32Array(1);
        window.crypto.getRandomValues(arr);
        return String(arr[0]);
      }
      return String(Math.floor(Math.random() * 1e9));
    }

    function getMinuteKey() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}`;
    }

    function buildTest() {
      const baseKey = `${state.name}|${state.className}|${getMinuteKey()}|${state.sessionSalt}`;
      state.seed = hashString(baseKey);
      state.variant = (state.seed % VARIANT_COUNT) + 1;
      state.testCode = `FT8-V${String(state.variant).padStart(3, "0")}-${shortCode(state.seed)}`;

      const rng = mulberry32(state.seed);
      const mixedPool = [
        ...fillPool.map((item) => ({ ...item, itemType: "fill" })),
        ...tfPool.map((item) => ({ ...item, itemType: "tf" }))
      ];

      const mixedQuestions = pickUnique(rng, mixedPool, MIXED_COUNT).map((item) =>
        item.itemType === "fill" ? questionFill(item) : questionTrueFalse(item)
      );

      const mandatoryComplex = genComplexIceToVapor(rng);
      const otherNumeric = pickUnique(rng, numericGenerators, NUMERIC_COUNT - 1).map((fn) => fn(rng));
      const numericQuestions = [mandatoryComplex, ...otherNumeric];

      state.questions = shuffleArray(rng, [...mixedQuestions, ...numericQuestions]);
      state.currentIdx = 0;
      state.correctAnswers = 0;
    }

    function showScreen(screen) {
      [el.login, el.game, el.end].forEach((node) => node.classList.remove("active"));
      screen.classList.add("active");
    }

    function showQuestion() {
      const q = state.questions[state.currentIdx];
      el.qInfo.textContent = `Cerința ${state.currentIdx + 1} / ${TOTAL_QUESTIONS}`;
      el.pointsInfo.textContent = `${q.points} puncte`;
      el.variantInfo.textContent = `Varianta ${state.variant} / ${VARIANT_COUNT}`;
      el.testCode.textContent = state.testCode;
      el.question.textContent = q.q;
      el.feedback.className = "feedback";
      el.feedback.style.display = "none";
      el.feedback.innerHTML = "";
      el.nextBtn.classList.add("hidden");

      el.inputArea.innerHTML = `
        <input type="text" id="userAnswer" placeholder="Răspuns..." autocomplete="off" />
        <button class="btn btn-primary" id="checkBtn">Verifică</button>
      `;

      const answerInput = document.getElementById("userAnswer");
      const checkBtn = document.getElementById("checkBtn");
      checkBtn.addEventListener("click", checkAnswer);
      answerInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") checkAnswer();
      });
      answerInput.focus();
    }

    function numericAccepted(userValue, exactAnswer) {
      if (decimalCount(userValue) > 2) return false;
      const userNum = parseLocaleNumber(userValue);
      if (Number.isNaN(userNum)) return false;

      const accepted = new Set([
        exactAnswer,
        truncateTo(exactAnswer, 2),
        roundTo(exactAnswer, 2)
      ].map((n) => Number(n.toFixed(6))));

      return accepted.has(Number(userNum.toFixed(6)));
    }

    function evaluateAnswer(userValue, q) {
      if (q.type === "fill" || q.type === "tf") {
        const clean = normalizeText(userValue);
        return q.answers.some((ans) => normalizeText(ans) === clean);
      }
      if (q.type === "numeric") {
        return numericAccepted(userValue, q.exactAnswer);
      }
      return false;
    }

    function checkAnswer() {
      const q = state.questions[state.currentIdx];
      const answerInput = document.getElementById("userAnswer");
      const userValue = answerInput.value;
      const correct = evaluateAnswer(userValue, q);

      answerInput.disabled = true;
      const checkBtn = document.getElementById("checkBtn");
      checkBtn.disabled = true;
      checkBtn.classList.add("btn-disabled");

      el.feedback.style.display = "block";
      if (correct) {
        state.correctAnswers++;
        el.feedback.className = "feedback ok";
        el.feedback.innerHTML = `Corect ✅<br>+${q.points} puncte`;
      } else {
        el.feedback.className = "feedback bad";
        if (q.type === "numeric") {
          el.feedback.innerHTML = `Greșit ❌<br>Formula: <strong>${q.formula}</strong><br>Rezultat corect: <strong>${q.displayAnswer}</strong>`;
        } else {
          el.feedback.innerHTML = `Greșit ❌<br>Răspuns corect: <strong>${q.answers[0]}</strong>`;
        }
      }
      el.nextBtn.classList.remove("hidden");
    }

    function nextQuestion() {
      state.currentIdx++;
      if (state.currentIdx < TOTAL_QUESTIONS) {
        showQuestion();
      } else {
        finishGame();
      }
    }

    function finishGame() {
      const points = state.correctAnswers * POINTS_PER_ITEM;
      const grade = (1 + (points * 9) / TOTAL_POINTS).toFixed(2);

      showScreen(el.end);
      el.finalScore.textContent = `${points}p`;
      el.rawPoints.textContent = `Scor: ${state.correctAnswers} / ${TOTAL_QUESTIONS} răspunsuri corecte • ${points} / ${TOTAL_POINTS} puncte.`;
      el.finalGrade.textContent = `Notă orientativă: ${grade}`;
      el.endVariant.textContent = `Varianta ${state.variant} din ${VARIANT_COUNT}`;
      el.endCode.textContent = `Cod test: ${state.testCode}`;

      const fd = new FormData();
      fd.append("nume", state.name);
      fd.append("clasa", `${state.className} - Fenomene termice 8`);
      fd.append("varianta", String(state.variant));
      fd.append("cod_test", state.testCode);
      fd.append("scor", String(points));
      fd.append("corecte", String(state.correctAnswers));
      fd.append("total_itemi", String(TOTAL_QUESTIONS));
      fd.append("punctaj_total", String(TOTAL_POINTS));

      fetch(SCRIPT_URL, { method: "POST", body: fd, mode: "no-cors" }).catch(() => {});
    }

    async function enterFullscreen() {
      const elem = document.documentElement;
      try {
        if (elem.requestFullscreen && !document.fullscreenElement) {
          await elem.requestFullscreen();
        }
      } catch (_) {}
    }

    async function startGame() {
      state.name = el.stdName.value.trim();
      state.className = el.stdClass.value;
      state.sessionSalt = generateSessionSalt();

      if (!state.name || !state.className) {
        alert("Completează numele și clasa!");
        return;
      }

      await enterFullscreen();
      buildTest();
      showScreen(el.game);
      showQuestion();
    }

    function restartApp() {
      showScreen(el.login);
      el.stdName.focus();
    }

    el.startBtn.addEventListener("click", startGame);
    el.nextBtn.addEventListener("click", nextQuestion);
    el.restartBtn.addEventListener("click", restartApp);
  </script>
</body>
</html>
