<!DOCTYPE html>
<html lang="ro">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Laborator Digital de Optică</title>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
}

.app{
width:1100px;
padding:20px;
}

h1{
text-align:center;
color:#fbbf24;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin:20px 0;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#fbbf24;
font-weight:bold;
cursor:pointer;
margin:5px;
}

canvas{
background:#020617;
border-radius:10px;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

.progress{
height:10px;
background:#334155;
border-radius:10px;
}

.bar{
height:100%;
width:0%;
background:#fbbf24;
}

.correct{color:#4ade80}
.wrong{color:#f87171}

</style>

</head>

<body>

<div class="app">

<h1>Laborator Digital de Optică</h1>

<div class="card">

<h3>Elev</h3>

<input id="name" placeholder="Nume elev">

<select id="class">

<option>VIII A</option>
<option>VIII B</option>
<option>VIII C</option>

</select>

</div>

<div class="card">

<h3>Simulare Oglindă Plană</h3>

Unghi incidență

<input type="range" min="0" max="80" value="30" id="angle">

<span id="aval"></span>

<canvas id="mirror" width="600" height="300"></canvas>

</div>

<div class="card">

<h3>Simulare Prismă / Refracție</h3>

n1

<select id="n1">

<option value="1">1</option>
<option value="1.41">√2</option>
<option value="1.73">√3</option>
<option value="2">2</option>

</select>

n2

<select id="n2">

<option value="1">1</option>
<option value="1.41">√2</option>
<option value="1.73">√3</option>
<option value="2">2</option>

</select>

Unghi

<input type="range" min="0" max="80" value="30" id="i">

<span id="ival"></span>

<canvas id="refract" width="600" height="300"></canvas>

</div>

<div class="card">

<h3>Simulare Lentile</h3>

Tip

<select id="lensType">

<option value="conv">Convergentă</option>
<option value="div">Divergentă</option>

</select>

Distanță obiect

<input type="range" min="60" max="200" value="120" id="obj">

Focală

<input type="range" min="40" max="120" value="80" id="focus">

<canvas id="lensCanvas" width="600" height="300"></canvas>

</div>

<div class="card">

<h3>Exerciții</h3>

<div id="question"></div>

<input id="answer">

<button onclick="check()">Verifică</button>

<div id="feedback"></div>

<div class="progress">

<div class="bar" id="bar"></div>

</div>

</div>

</div>

<script>

const SCRIPT_URL="PASTE_GOOGLE_SCRIPT_URL_HERE"

let mirror=document.getElementById("mirror")

let ctx=mirror.getContext("2d")

function drawMirror(){

let a=document.getElementById("angle").value

document.getElementById("aval").innerText=a+"°"

ctx.clearRect(0,0,600,300)

ctx.strokeStyle="white"

ctx.beginPath()

ctx.moveTo(300,0)

ctx.lineTo(300,300)

ctx.stroke()

let rad=a*Math.PI/180

let x=300-150*Math.sin(rad)

let y=150-150*Math.cos(rad)

ctx.strokeStyle="yellow"

ctx.beginPath()

ctx.moveTo(x,y)

ctx.lineTo(300,150)

ctx.stroke()

ctx.strokeStyle="orange"

ctx.beginPath()

ctx.moveTo(300,150)

ctx.lineTo(300+150*Math.sin(rad),150-150*Math.cos(rad))

ctx.stroke()

}

document.getElementById("angle").oninput=drawMirror

drawMirror()

/* GENERATOR EXERCIȚII */

let questions=[]

let angles=[30,45,60]

let n=[1,1.41,1.73,2]

function generate(){

for(let k=0;k<300;k++){

let a=angles[Math.floor(Math.random()*3)]

questions.push({

q:`Dacă unghiul de incidență este ${a}°, unghiul de reflexie este?`,

a:a,

exp:"Legea reflexiei: i=r"

})

}

for(let k=0;k<300;k++){

questions.push({

q:"Unghiul dintre raze este 80°. i=?",

a:40,

exp:"Unghiul dintre raze = 2i"

})

}

for(let k=0;k<400;k++){

questions.push({

q:"Diamant n=2 → aer n=1. Unghi limită?",

a:30,

exp:"sin l = 1/2"

})

}

}

generate()

questions.sort(()=>0.5-Math.random())

let index=0

let correct=0

function show(){

let q=questions[index]

document.getElementById("question").innerText=q.q

document.getElementById("feedback").innerText=""

let p=index/questions.length*100

document.getElementById("bar").style.width=p+"%"

}

show()

function check(){

let u=document.getElementById("answer").value

let q=questions[index]

if(u==q.a){

correct++

document.getElementById("feedback").innerHTML="<span class='correct'>Corect</span><br>"+q.exp

}

else{

document.getElementById("feedback").innerHTML="<span class='wrong'>Greșit</span><br>"+q.exp

}

index++

if(index<questions.length)

setTimeout(show,1200)

else finish()

}

function finish(){

let score=Math.round(correct/questions.length*100)

let grade=(1+9*(correct/questions.length)).toFixed(2)

document.getElementById("question").innerText="Rezultat: "+grade

sendResult(score,grade)

}

function sendResult(score,grade){

let fd=new FormData()

fd.append("name",document.getElementById("name").value)

fd.append("class",document.getElementById("class").value)

fd.append("score",score)

fd.append("grade",grade)

fetch(SCRIPT_URL,{method:"POST",body:fd})

}

</script>

</body>
</html>
