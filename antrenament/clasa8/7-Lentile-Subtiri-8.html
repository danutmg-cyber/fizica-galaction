<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FIZICĂ VIII - Lentile subțiri</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #4ade80;
      --bad: #f87171;
      --border: #334155;
      --panel: rgba(15, 23, 42, 0.92);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      padding: 12px;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: none;
    }

    .screen.active { display: block; }

    .card {
      width: 100%;
      height: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      padding: 24px;
      overflow: auto;
    }

    .start-wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .school {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .teacher {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.6px;
    }

    .quote {
      color: #fef08a;
      font-style: italic;
      background: rgba(251, 191, 36, 0.10);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 10px 12px;
      display: inline-block;
      max-width: 100%;
    }

    .title {
      text-align: center;
      font-size: 1.8rem;
      margin: 0 0 8px;
    }

    .subtle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
      margin-bottom: 14px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid #475569;
      background: #0b1220;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .info-box {
      text-align: center;
      color: #fde68a;
      background: rgba(251, 191, 36, 0.10);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      font-weight: 700;
      line-height: 1.45;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .btn:hover { opacity: 0.96; }
    .btn:active { transform: scale(0.99); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--primary-dark); color: white; }
    .btn-disabled { opacity: 0.55; cursor: not-allowed; }

    .game-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .pill {
      background: rgba(14, 165, 233, 0.12);
      color: var(--accent);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 0.92rem;
    }

    .question-box {
      font-size: 1.38rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      margin: 8px auto 18px;
      max-width: 1050px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .answer-box {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .feedback {
      margin: 18px auto 0;
      padding: 14px;
      border-radius: 14px;
      display: none;
      text-align: center;
      font-weight: 700;
      line-height: 1.55;
      border: 1px solid transparent;
      max-width: 900px;
    }

    .feedback.ok {
      color: var(--ok);
      background: rgba(74, 222, 128, 0.08);
      border-color: rgba(74, 222, 128, 0.22);
    }

    .feedback.bad {
      color: #fecaca;
      background: rgba(248, 113, 113, 0.10);
      border-color: rgba(248, 113, 113, 0.22);
    }

    .result-score {
      font-size: 4.8rem;
      color: var(--accent);
      font-weight: 900;
      text-align: center;
      line-height: 1;
      margin: 24px 0 10px;
    }

    .center { text-align: center; }
    .muted { color: var(--muted); }
    .hidden { display: none; }

    @media (max-width: 760px) {
      .app { padding: 8px; }
      .card { padding: 16px; border-radius: 18px; }
      .grid { grid-template-columns: 1fr; }
      .question-box { font-size: 1.1rem; min-height: 100px; }
      .title { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="screen active" id="screen-login">
      <div class="card">
        <div class="start-wrap">
          <div class="header">
            <div class="school">ȘCOALA GIMNAZIALĂ ....</div>
            <div class="teacher">Prof. DĂNUȚ ANDRONIE</div>
            <div class="quote">FIZICA NU ESTE O MATERIE DOMINATĂ DE FORMULE CI DE LOGICĂ</div>
          </div>

          <h1 class="title">Lentile subțiri</h1>
          <p class="subtle">Clasa a VIII-a • 20 itemi • 100 puncte • minimum 100 variante</p>

          <div class="grid">
            <input type="text" id="stdName" placeholder="Nume și prenume elev" autocomplete="name" />
            <select id="stdClass">
              <option value="">Clasa...</option>
              <option value="CLASA a VIII-a A">CLASA a VIII-a A</option>
              <option value="CLASA a VIII-a B">CLASA a VIII-a B</option>
              <option value="CLASA a VIII-a C">CLASA a VIII-a C</option>
              <option value="CLASA a VIII-a D">CLASA a VIII-a D</option>
            </select>
          </div>

          <div class="info-box">Scrie numai valoarea numerică, cu maximum 2 zecimale.</div>

          <button class="btn btn-primary" id="startBtn">Începe testul</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-game">
      <div class="card game-card">
        <div>
          <div class="meta-row">
            <div class="pill" id="q-info">Cerința 1 / 20</div>
            <div class="pill" id="points-info">5 puncte</div>
            <div class="pill" id="variant-info">Varianta 1 / 100</div>
            <div class="pill" id="test-code">Cod test</div>
          </div>

          <div class="question-box" id="question"></div>
          <div class="answer-box" id="input-area"></div>
          <div class="feedback" id="feedback"></div>
        </div>

        <button class="btn btn-secondary hidden" id="nextBtn">Următoarea</button>
      </div>
    </section>

    <section class="screen" id="screen-end">
      <div class="card">
        <h2 class="title">Rezultat</h2>
        <div class="center muted" id="end-variant"></div>
        <div class="result-score" id="final-score"></div>
        <p class="center muted" id="raw-points"></p>
        <p class="center muted" id="final-grade"></p>
        <p class="center muted" id="end-code"></p>
        <button class="btn btn-primary" id="restartBtn">Reia testul</button>
      </div>
    </section>
  </div>

  <script>

    function normalizeText(value) {
      return String(value)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeNumberString(value) {
      return String(value).trim().replace(/,/g, ".").replace(/\s+/g, "");
    }

    function parseLocaleNumber(value) {
      const cleaned = normalizeNumberString(value);
      if (!/^[-+]?\d+(\.\d+)?$/.test(cleaned)) return NaN;
      return Number(cleaned);
    }

    function decimalCount(value) {
      const cleaned = normalizeNumberString(value);
      return cleaned.includes(".") ? cleaned.split(".")[1].length : 0;
    }

    function truncateTo(num, decimals = 2) {
      const factor = Math.pow(10, decimals);
      return Math.trunc(num * factor) / factor;
    }

    function roundTo(num, decimals = 2) {
      const factor = Math.pow(10, decimals);
      return Math.round(num * factor) / factor;
    }

    function formatNumber(num, maxDecimals = 2) {
      if (Number.isInteger(num)) return String(num);
      return Number(num.toFixed(maxDecimals)).toString();
    }

    function formatPrecise(num) {
      if (Number.isInteger(num)) return String(num);
      return Number(num.toFixed(4)).toString();
    }

    function shortCode(seed) {
      return (seed >>> 0).toString(36).toUpperCase().slice(0, 6);
    }

    function hashString(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }
