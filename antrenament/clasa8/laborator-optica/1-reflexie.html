<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Reflexia luminii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 0.5rem;
      background: #222;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    header h1 {
      font-size: 1.1rem;
      margin-bottom: 0.2rem;
    }

    header h2 {
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    header h3 {
      font-size: 0.9rem;
      font-weight: normal;
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.5rem;
      gap: 0.5rem;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      background: #1b1b1b;
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    input[type="range"] {
      width: 100%;
    }

    .values {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      padding: 0.3rem;
      background: #222;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<header>
  <h1>ȘCOALA GIMNAZIALĂ „GALA GALACTION” MANGALIA</h1>
  <h2>LABORATORUL VIRTUAL DE FIZICĂ</h2>
  <h3>Prof. DĂNUȚ ANDRONIE</h3>
</header>

<main>
  <section class="controls">
    <label for="angleSlider">Unghiul de incidență \( i \) (°):</label>
    <input type="range" id="angleSlider" min="0" max="80" value="30">
    <div class="values">
      <span>i = <span id="angleI">30</span>°</span>
      <span>r = <span id="angleR">30</span>°</span>
      <span>n₁ – mediul de sus &nbsp;&nbsp; n₂ – mediul de jos</span>
    </div>
  </section>

  <section class="canvas-container">
    <canvas id="canvas"></canvas>
  </section>
</main>

<footer>
  Reflexia luminii – unghiul de incidență este egal cu unghiul de reflexie: i = r
</footer>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const angleSlider = document.getElementById('angleSlider');
  const angleIText = document.getElementById('angleI');
  const angleRText = document.getElementById('angleR');

  function resizeCanvas() {
    const width = canvas.parentElement.clientWidth;
    const height = window.innerHeight * 0.75; 
    canvas.width = width;
    canvas.height = height;
    drawScene(parseFloat(angleSlider.value));
  }

  function drawScene(angleDeg) {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const centerX = w / 2;
    const interfaceY = h / 2;

    const lineColor = '#ffffff';
    const dashedColor = '#aaaaaa';
    const incidentColor = '#00bfff';
    const reflectedColor = '#ffcc00';
    const textColor = '#ffffff';

    ctx.lineWidth = 4;
    ctx.font = Math.round(h * 0.06) + 'px Arial Black';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.strokeStyle = lineColor;
    ctx.beginPath();
    ctx.moveTo(0, interfaceY);
    ctx.lineTo(w, interfaceY);
    ctx.stroke();

    ctx.fillStyle = textColor;
    ctx.textAlign = 'left';
    ctx.fillText('n₁', 20, interfaceY - h * 0.25);
    ctx.fillText('n₂', 20, interfaceY + h * 0.25);

    ctx.strokeStyle = dashedColor;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(centerX, 0);
    ctx.lineTo(centerX, h);
    ctx.stroke();
    ctx.setLineDash([]);

    const Px = centerX;
    const Py = interfaceY;

    const angleRad = angleDeg * Math.PI / 180;
    const rayLen = Math.min(w, h) * 0.45;

    const incX = Px - rayLen * Math.sin(angleRad);
    const incY = Py - rayLen * Math.cos(angleRad);

    ctx.strokeStyle = incidentColor;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(incX, incY);
    ctx.lineTo(Px, Py);
    ctx.stroke();

    const refX = Px + rayLen * Math.sin(angleRad);
    const refY = Py - rayLen * Math.cos(angleRad);

    ctx.strokeStyle = reflectedColor;
    ctx.beginPath();
    ctx.moveTo(Px, Py);
    ctx.lineTo(refX, refY);
    ctx.stroke();

    const arcRadius = Math.min(w, h) * 0.18;

    const normalCanvasAngle = -Math.PI / 2;

    ctx.strokeStyle = incidentColor;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(Px, Py, arcRadius,
      normalCanvasAngle - angleRad,
      normalCanvasAngle,
      false
    );
    ctx.stroke();

    ctx.strokeStyle = reflectedColor;
    ctx.beginPath();
    ctx.arc(Px, Py, arcRadius,
      normalCanvasAngle,
      normalCanvasAngle + angleRad,
      false
    );
    ctx.stroke();

    ctx.fillStyle = incidentColor;
    const iLabelAngle = normalCanvasAngle - angleRad / 2;
    ctx.fillText('i',
      Px + (arcRadius + 40) * Math.cos(iLabelAngle),
      Py + (arcRadius + 40) * Math.sin(iLabelAngle)
    );

    ctx.fillStyle = reflectedColor;
    const rLabelAngle = normalCanvasAngle + angleRad / 2;
    ctx.fillText('r',
      Px + (arcRadius + 40) * Math.cos(rLabelAngle),
      Py + (arcRadius + 40) * Math.sin(rLabelAngle)
    );

    angleIText.textContent = angleDeg.toFixed(0);
    angleRText.textContent = angleDeg.toFixed(0);
  }

  angleSlider.addEventListener('input', () => {
    drawScene(parseFloat(angleSlider.value));
  });

  window.addEventListener('resize', resizeCanvas);

  resizeCanvas();
</script>

</body>
</html>
