<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Reflexia luminii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 0.5rem;
      background: #222;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    header h1 {
      font-size: 1.1rem;
      margin-bottom: 0.2rem;
    }

    header h2 {
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    header h3 {
      font-size: 0.9rem;
      font-weight: normal;
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.5rem;
      gap: 0.5rem;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      background: #1b1b1b;
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .controls label {
      font-weight: bold;
    }

    input[type="range"] {
      width: 100%;
    }

    .values {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      max-width: 900px;
      height: auto;
      background: #000;
      display: block;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      padding: 0.3rem;
      background: #222;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<header>
  <h1>ȘCOALA GIMNAZIALĂ „GALA GALACTION” MANGALIA</h1>
  <h2>LABORATORUL VIRTUAL DE FIZICĂ</h2>
  <h3>Prof. DĂNUȚ ANDRONIE</h3>
</header>

<main>
  <section class="controls">
    <div class="controls-row">
      <label for="angleSlider">Unghiul de incidență \( i \) (°):</label>
    </div>
    <input type="range" id="angleSlider" min="0" max="80" value="30">
    <div class="values">
      <span>i = <span id="angleI">30</span>°</span>
      <span>r = <span id="angleR">30</span>°</span>
      <span>n₁ – mediul de sus &nbsp;&nbsp; n₂ – mediul de jos</span>
    </div>
  </section>

  <section class="canvas-container">
    <canvas id="canvas"></canvas>
  </section>
</main>

<footer>
  Reflexia luminii – unghiul de incidență este egal cu unghiul de reflexie: i = r
</footer>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const angleSlider = document.getElementById('angleSlider');
  const angleIText = document.getElementById('angleI');
  const angleRText = document.getElementById('angleR');

  function resizeCanvas() {
    // raport aproximativ 16:9 pentru toate dispozitivele
    const width = canvas.parentElement.clientWidth;
    const height = Math.min(window.innerHeight * 0.65, width * 9 / 16);
    canvas.width = width;
    canvas.height = height;
    drawScene(parseFloat(angleSlider.value));
  }

  function drawScene(angleDeg) {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // coordonate de bază
    const centerX = w / 2;
    const interfaceY = h / 2;

    // culori
    const lineColor = '#ffffff';
    const dashedColor = '#aaaaaa';
    const incidentColor = '#00bfff';
    const reflectedColor = '#ffcc00';
    const textColor = '#ffffff';

    ctx.lineWidth = 2;
    ctx.font = Math.round(h * 0.04) + 'px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // linia de separare a mediilor
    ctx.strokeStyle = lineColor;
    ctx.beginPath();
    ctx.moveTo(0, interfaceY);
    ctx.lineTo(w, interfaceY);
    ctx.stroke();

    // etichete n1, n2
    ctx.fillStyle = textColor;
    ctx.fillText('n₁', centerX, interfaceY - h * 0.2);
    ctx.fillText('n₂', centerX, interfaceY + h * 0.2);

    // normala (linie punctată)
    ctx.strokeStyle = dashedColor;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(centerX, 0);
    ctx.lineTo(centerX, h);
    ctx.stroke();
    ctx.setLineDash([]);

    // punctul de incidență
    const Px = centerX;
    const Py = interfaceY;

    // unghiul față de normala (în grade)
    const angleRad = angleDeg * Math.PI / 180;

    // lungimea razelor
    const rayLen = Math.min(w, h) * 0.4;

    // rază incidentă (de sus, din stânga)
    const incX = Px - rayLen * Math.sin(angleRad);
    const incY = Py - rayLen * Math.cos(angleRad);

    ctx.strokeStyle = incidentColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(incX, incY);
    ctx.lineTo(Px, Py);
    ctx.stroke();

    // rază reflectată (simetrică față de normala)
    const refX = Px + rayLen * Math.sin(angleRad);
    const refY = Py - rayLen * Math.cos(angleRad);

    ctx.strokeStyle = reflectedColor;
    ctx.beginPath();
    ctx.moveTo(Px, Py);
    ctx.lineTo(refX, refY);
    ctx.stroke();

    // marcarea unghiurilor i și r (arce)
    const arcRadius = Math.min(w, h) * 0.12;

    // unghiul 0 (normala) este în sus; pentru arc folosim sistemul canvas (0 rad la dreapta)
    // pentru a desena corect, transformăm: unghi față de normala -> față de axa Ox
    // normala în sus corespunde la -90° (sau 270°) în sistem canvas
    const normalCanvasAngle = -Math.PI / 2;

    // arc pentru i (în partea stângă)
    ctx.strokeStyle = incidentColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(Px, Py, arcRadius,
      normalCanvasAngle - angleRad,
      normalCanvasAngle,
      false
    );
    ctx.stroke();

    // arc pentru r (în partea dreaptă)
    ctx.strokeStyle = reflectedColor;
    ctx.beginPath();
    ctx.arc(Px, Py, arcRadius,
      normalCanvasAngle,
      normalCanvasAngle + angleRad,
      false
    );
    ctx.stroke();

    // etichete i și r
    ctx.fillStyle = incidentColor;
    const iLabelAngle = normalCanvasAngle - angleRad / 2;
    const iLabelX = Px + (arcRadius + 20) * Math.cos(iLabelAngle);
    const iLabelY = Py + (arcRadius + 20) * Math.sin(iLabelAngle);
    ctx.fillText('i', iLabelX, iLabelY);

    ctx.fillStyle = reflectedColor;
    const rLabelAngle = normalCanvasAngle + angleRad / 2;
    const rLabelX = Px + (arcRadius + 20) * Math.cos(rLabelAngle);
    const rLabelY = Py + (arcRadius + 20) * Math.sin(rLabelAngle);
    ctx.fillText('r', rLabelX, rLabelY);

    // actualizare valori text
    angleIText.textContent = angleDeg.toFixed(0);
    angleRText.textContent = angleDeg.toFixed(0);
  }

  angleSlider.addEventListener('input', () => {
    drawScene(parseFloat(angleSlider.value));
  });

  window.addEventListener('resize', resizeCanvas);

  // inițializare
  resizeCanvas();
</script>

</body>
</html>
