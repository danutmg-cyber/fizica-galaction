<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Refracția luminii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 0.5rem;
      background: #222;
      line-height: 1.4;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.5rem;
      gap: 0.5rem;
    }

    .controls {
      background: #1b1b1b;
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    input[type="range"] { width: 100%; }

    .values {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      padding: 0.4rem;
      background: #222;
    }
  </style>
</head>
<body>

<header>
  <h1>ȘCOALA GIMNAZIALĂ „GALA GALACTION” MANGALIA</h1>
  <h2>LABORATORUL VIRTUAL DE FIZICĂ</h2>
  <h3>Prof. DĂNUȚ ANDRONIE</h3>
</header>

<main>
  <section class="controls">
    <label>Unghiul de incidență i (°):</label>
    <input type="range" id="angleSlider" min="0" max="80" value="30">

    <div class="values">
      <span>i = <span id="angleI">30</span>°</span>
      <span>r = <span id="angleR">0</span>°</span>
      <span>n₁ = <span id="n1">1.00</span></span>
      <span>n₂ = <span id="n2">1.50</span></span>
    </div>
  </section>

  <section class="canvas-container">
    <canvas id="canvas"></canvas>
  </section>
</main>

<footer>
  Legea refracției: <b>n₁ · sin i = n₂ · sin r</b>
</footer>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const angleSlider = document.getElementById("angleSlider");
  const angleIText = document.getElementById("angleI");
  const angleRText = document.getElementById("angleR");

  const n1 = 1.00; // aer
  const n2 = 1.50; // sticlă

  document.getElementById("n1").textContent = n1.toFixed(2);
  document.getElementById("n2").textContent = n2.toFixed(2);

  function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = window.innerHeight * 0.75;
    drawScene(parseFloat(angleSlider.value));
  }

  function drawScene(angleDeg) {
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const centerX = w / 2;
    const interfaceY = h / 2;

    const incidentColor = "#00bfff";
    const refractedColor = "#00ff66";
    const reflectedColor = "#ffcc00";
    const dashedColor = "#aaaaaa";
    const textColor = "#ffffff";

    ctx.lineWidth = 4;
    ctx.font = Math.round(h * 0.06) + "px Arial Black";
    ctx.textBaseline = "middle";

    // linia de separare
    ctx.strokeStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(0, interfaceY);
    ctx.lineTo(w, interfaceY);
    ctx.stroke();

    // etichete n1, n2 în stânga
    ctx.fillStyle = textColor;
    ctx.textAlign = "left";
    ctx.fillText("n₁", 20, interfaceY - h * 0.25);
    ctx.fillText("n₂", 20, interfaceY + h * 0.25);

    // normala
    ctx.strokeStyle = dashedColor;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(centerX, 0);
    ctx.lineTo(centerX, h);
    ctx.stroke();
    ctx.setLineDash([]);

    const Px = centerX;
    const Py = interfaceY;

    const angleRad = angleDeg * Math.PI / 180;
    const rayLen = Math.min(w, h) * 0.45;

    // raza incidentă
    const incX = Px - rayLen * Math.sin(angleRad);
    const incY = Py - rayLen * Math.cos(angleRad);

    ctx.strokeStyle = incidentColor;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(incX, incY);
    ctx.lineTo(Px, Py);
    ctx.stroke();

    // calcul unghi refracție (Snell)
    let sin_r = (n1 / n2) * Math.sin(angleRad);
    let rRad = Math.asin(Math.min(1, sin_r)); // protecție TIR

    const rDeg = rRad * 180 / Math.PI;
    angleRText.textContent = rDeg.toFixed(0);

    // raza refractată
    const refX = Px + rayLen * Math.sin(rRad);
    const refY = Py + rayLen * Math.cos(rRad);

    ctx.strokeStyle = refractedColor;
    ctx.beginPath();
    ctx.moveTo(Px, Py);
    ctx.lineTo(refX, refY);
    ctx.stroke();

    // raza reflectată (opțional)
    const reflX = Px + rayLen * Math.sin(angleRad);
    const reflY = Py - rayLen * Math.cos(angleRad);

    ctx.strokeStyle = reflectedColor;
    ctx.beginPath();
    ctx.moveTo(Px, Py);
    ctx.lineTo(reflX, reflY);
    ctx.stroke();

    // arce unghiuri
    const arcRadius = Math.min(w, h) * 0.18;
    const normalAngle = -Math.PI / 2;

    // arc incident
    ctx.strokeStyle = incidentColor;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(Px, Py, arcRadius, normalAngle - angleRad, normalAngle);
    ctx.stroke();

    // arc refractat
    ctx.strokeStyle = refractedColor;
    ctx.beginPath();
    ctx.arc(Px, Py, arcRadius, normalAngle, normalAngle + rRad);
    ctx.stroke();

    // etichete i și r
    ctx.fillStyle = incidentColor;
    ctx.fillText("i",
      Px + (arcRadius + 40) * Math.cos(normalAngle - angleRad / 2),
      Py + (arcRadius + 40) * Math.sin(normalAngle - angleRad / 2)
    );

    ctx.fillStyle = refractedColor;
    ctx.fillText("r",
      Px + (arcRadius + 40) * Math.cos(normalAngle + rRad / 2),
      Py + (arcRadius + 40) * Math.sin(normalAngle + rRad / 2)
    );

    angleIText.textContent = angleDeg.toFixed(0);
  }

  angleSlider.addEventListener("input", () => {
    drawScene(parseFloat(angleSlider.value));
  });

  window.addEventListener("resize", resizeCanvas);

  resizeCanvas();
</script>

</body>
</html>
