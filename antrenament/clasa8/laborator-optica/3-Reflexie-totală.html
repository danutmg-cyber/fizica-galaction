<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Reflexie totală</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 0.3rem;
      background: #222;
      font-size: 0.8rem;
      line-height: 1.2;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.4rem;
      gap: 0.4rem;
    }

    .controls {
      background: #1b1b1b;
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .controls input[type="range"],
    .controls input[type="number"] {
      width: 100%;
      margin-top: 0.2rem;
    }

    .values {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.3rem;
      font-size: 0.9rem;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      padding: 0.4rem;
      background: #222;
    }
  </style>
</head>
<body>

<header>
  <h1>ȘCOALA GIMNAZIALĂ „GALA GALACTION” MANGALIA</h1>
  <h2>LABORATORUL VIRTUAL DE FIZICĂ</h2>
  <h3>Prof. DĂNUȚ ANDRONIE</h3>
</header>

<main>

  <section class="controls">
    <label>Unghiul de incidență i (°):</label>
    <input type="range" id="angleSlider" min="0" max="80" value="20">

    <label>Indice de refracție n₁ (sus):</label>
    <input type="number" id="n1Input" min="1.00" max="3.00" step="0.01" value="1.50">

    <label>Indice de refracție n₂ (jos):</label>
    <input type="number" id="n2Input" min="1.00" max="3.00" step="0.01" value="1.00">

    <div class="values">
      <span>i = <span id="angleI">20</span>°</span>
      <span>r = <span id="angleR">0</span>°</span>
      <span>i<sub>critic</sub> = <span id="angleCritic">0</span>°</span>
    </div>
  </section>

  <section class="canvas-container">
    <canvas id="canvas"></canvas>
  </section>

</main>

<footer>
  Reflexie totală: apare când <b>i ≥ i<sub>critic</sub></b> și <b>n₁ &gt; n₂</b>
</footer>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const angleSlider = document.getElementById("angleSlider");
  const angleIText = document.getElementById("angleI");
  const angleRText = document.getElementById("angleR");
  const angleCriticText = document.getElementById("angleCritic");

  const n1Input = document.getElementById("n1Input");
  const n2Input = document.getElementById("n2Input");

  function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = window.innerHeight * 0.78;
    drawScene();
  }

  function drawScene() {
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const centerX = w / 2;
    const interfaceY = h / 2;

    const incidentColor = "#00bfff";
    const refractedColor = "#00ff66";
    const reflectedColor = "#ffcc00";
    const dashedColor = "#aaaaaa";
    const textColor = "#ffffff";

    ctx.lineWidth = 4;
    ctx.font = Math.round(h * 0.06) + "px Arial Black";
    ctx.textBaseline = "middle";

    const iDeg = parseFloat(angleSlider.value);
    const iRad = iDeg * Math.PI / 180;

    const n1 = parseFloat(n1Input.value);
    const n2 = parseFloat(n2Input.value);

    angleIText.textContent = iDeg.toFixed(0);

    // unghi critic
    let iCritic = 0;
    if (n1 > n2) {
      iCritic = Math.asin(n2 / n1) * 180 / Math.PI;
    }
    angleCriticText.textContent = iCritic.toFixed(0);

    // linia de separare
    ctx.strokeStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(0, interfaceY);
    ctx.lineTo(w, interfaceY);
    ctx.stroke();

    // etichete n1, n2
    ctx.fillStyle = textColor;
    ctx.textAlign = "left";
    ctx.fillText("n₁", 20, interfaceY - h * 0.25);
    ctx.fillText("n₂", 20, interfaceY + h * 0.25);

    // normala
    ctx.strokeStyle = dashedColor;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(centerX, 0);
    ctx.lineTo(centerX, h);
    ctx.stroke();
    ctx.setLineDash([]);

    const Px = centerX;
    const Py = interfaceY;
    const rayLen = Math.min(w, h) * 0.45;

    // raza incidentă
    const incX = Px - rayLen * Math.sin(iRad);
    const incY = Py - rayLen * Math.cos(iRad);

    ctx.strokeStyle = incidentColor;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(incX, incY);
    ctx.lineTo(Px, Py);
    ctx.stroke();

    // calcul refracție
    let sin_r = (n1 / n2) * Math.sin(iRad);
    let totalInternal = false;

    if (sin_r > 1 || iDeg >= iCritic) {
      totalInternal = true;
    }

    let rRad = totalInternal ? 0 : Math.asin(sin_r);
    let rDeg = rRad * 180 / Math.PI;
    angleRText.textContent = totalInternal ? "-" : rDeg.toFixed(0);

    // raza refractată
    if (!totalInternal) {
      const refX = Px + rayLen * Math.sin(rRad);
      const refY = Py + rayLen * Math.cos(rRad);

      ctx.strokeStyle = refractedColor;
      ctx.beginPath();
      ctx.moveTo(Px, Py);
      ctx.lineTo(refX, refY);
      ctx.stroke();
    }

    // raza reflectată (mereu prezentă)
    const reflX = Px + rayLen * Math.sin(iRad);
    const reflY = Py - rayLen * Math.cos(iRad);

    ctx.strokeStyle = reflectedColor;
    ctx.beginPath();
    ctx.moveTo(Px, Py);
    ctx.lineTo(reflX, reflY);
    ctx.stroke();

    // arce unghiuri
    const arcRadius = Math.min(w, h) * 0.18;
    const normalAngle = -Math.PI / 2;

    // arc incident
    ctx.strokeStyle = incidentColor;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(Px, Py, arcRadius, normalAngle - iRad, normalAngle);
    ctx.stroke();

    // arc refractat sau critic
    ctx.strokeStyle = totalInternal ? "#ff4444" : refractedColor;
    ctx.beginPath();
    ctx.arc(Px, Py, arcRadius, normalAngle, normalAngle + (totalInternal ? iRad : rRad));
    ctx.stroke();

    // etichete i și r
    ctx.fillStyle = incidentColor;
    ctx.fillText("i",
      Px + (arcRadius + 40) * Math.cos(normalAngle - iRad / 2),
      Py + (arcRadius + 40) * Math.sin(normalAngle - iRad / 2)
    );

    ctx.fillStyle = totalInternal ? "#ff4444" : refractedColor;
    ctx.fillText(totalInternal ? "TIR" : "r",
      Px + (arcRadius + 40) * Math.cos(normalAngle + (totalInternal ? iRad / 2 : rRad / 2)),
      Py + (arcRadius + 40) * Math.sin(normalAngle + (totalInternal ? iRad / 2 : rRad / 2))
    );
  }

  angleSlider.addEventListener("input", drawScene);
  n1Input.addEventListener("input", drawScene);
  n2Input.addEventListener("input", drawScene);

  window.addEventListener("resize", resizeCanvas);

  resizeCanvas();
</script>

</body>
</html>
