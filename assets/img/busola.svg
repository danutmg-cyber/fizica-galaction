<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <!-- Gradients -->
    <radialGradient id="compassGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </radialGradient>

    <linearGradient id="needleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4757;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="needleGradientBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0277bd;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- TITLU -->
  <text x="200" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a2e">
    Busola Magnetică
  </text>

  <!-- CORP EXTERIOR (Metal) -->
  <rect x="50" y="70" width="300" height="350" rx="15" fill="#c0c0c0" stroke="#808080" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- ORNAMENT TOP -->
  <rect x="150" y="65" width="100" height="15" rx="7" fill="#ffd700" stroke="#daa520" stroke-width="1"/>
  <circle cx="200" cy="72" r="3" fill="#ffed4e"/>

  <!-- CADRAN (Placa de sticlă) -->
  <circle cx="200" cy="245" r="90" fill="url(#compassGradient)" stroke="#333" stroke-width="2"/>
  
  <!-- Cerc interior mai închis -->
  <circle cx="200" cy="245" r="85" fill="none" stroke="#ddd" stroke-width="1" opacity="0.5"/>

  <!-- DIRECȚIILE CARDINALE - MARI (N, S, E, W) -->
  <!-- NORD (roșu deschis - magnetic) -->
  <circle cx="200" cy="165" r="10" fill="#ff6b6b" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="200" y="173" font-size="16" font-weight="bold" text-anchor="middle" fill="white">N</text>
  <text x="200" y="195" font-size="10" text-anchor="middle" fill="#ff6b6b" font-weight="bold">NORD</text>
  <text x="200" y="208" font-size="8" text-anchor="middle" fill="#d32f2f">(Magnetic)</text>

  <!-- SUD (albastru - sud magnetic, repulsiv) -->
  <circle cx="200" cy="325" r="10" fill="#4fc3f7" stroke="#0277bd" stroke-width="1.5"/>
  <text x="200" y="333" font-size="16" font-weight="bold" text-anchor="middle" fill="white">S</text>
  <text x="200" y="350" font-size="10" text-anchor="middle" fill="#0277bd" font-weight="bold">SUD</text>

  <!-- EST (negru - dreapta) -->
  <circle cx="280" cy="245" r="8" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="280" y="252" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">E</text>
  <text x="280" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">EST</text>

  <!-- VEST (negru - stânga) -->
  <circle cx="120" cy="245" r="8" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="120" y="252" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">W</text>
  <text x="120" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">VEST</text>

  <!-- DIRECȚIILE INTERMEDIARE (NE, SE, SW, NW) -->
  <!-- NE (Nord-Est) -->
  <text x="255" y="190" font-size="9" text-anchor="middle" fill="#666">NE</text>

  <!-- SE (Sud-Est) -->
  <text x="255" y="305" font-size="9" text-anchor="middle" fill="#666">SE</text>

  <!-- SW (Sud-Vest) -->
  <text x="145" y="305" font-size="9" text-anchor="middle" fill="#666">SW</text>

  <!-- NW (Nord-Vest) -->
  <text x="145" y="190" font-size="9" text-anchor="middle" fill="#666">NW</text>

  <!-- GRADAȚII DE GRADE (0-360) -->
  <!-- Gradații principale (0, 90, 180, 270) -->
  <line x1="200" y1="160" x2="200" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="290" y1="245" x2="280" y2="245" stroke="#333" stroke-width="2"/>
  <line x1="200" y1="330" x2="200" y2="320" stroke="#333" stroke-width="2"/>
  <line x1="110" y1="245" x2="120" y2="245" stroke="#333" stroke-width="2"/>

  <!-- Gradații secundare (45, 135, 225, 315) -->
  <line x1="260" y1="175" x2="265" y2="170" stroke="#666" stroke-width="1" opacity="0.7"/>
  <line x1="315" y1="260" x2="310" y2="265" stroke="#666" stroke-width="1" opacity="0.7"/>
  <line x1="260" y1="315" x2="265" y2="310" stroke="#666" stroke-width="1" opacity="0.7"/>
  <line x1="85" y1="260" x2="90" y2="265" stroke="#666" stroke-width="1" opacity="0.7"/>

  <!-- Gradații mici (fiecare 10 grade) -->
  <g id="smallMarks" stroke="#ccc" stroke-width="0.5" opacity="0.6">
    <!-- 10° -->
    <line x1="200" y1="161" x2="200" y2="167" transform="rotate(10 200 245)"/>
    <!-- 20° -->
    <line x1="200" y1="161" x2="200" y2="167" transform="rotate(20 200 245)"/>
    <!-- 30° -->
    <line x1="200" y1="161" x2="200" y2="167" transform="rotate(30 200 245)"/>
    <!-- ... și așa mai departe pentru celelalte unghiuri -->
  </g>

  <!-- ACul MAGNETIC (NORD - roșu) -->
  <!-- Vârful roșu (Nord) -->
  <path d="M 200 180 L 195 245 L 200 160 L 205 245 Z" fill="url(#needleGradient)" stroke="#d32f2f" stroke-width="1.5" filter="url(#shadow)"/>
  
  <!-- Vârful albastru (Sud) -->
  <path d="M 200 310 L 195 245 L 200 330 L 205 245 Z" fill="url(#needleGradientBlue)" stroke="#0277bd" stroke-width="1.5"/>

  <!-- CENTRU (Cercul central de susținere) -->
  <circle cx="200" cy="245" r="8" fill="#ffd700" stroke="#daa520" stroke-width="1.5"/>
  <circle cx="200" cy="245" r="5" fill="#ffed4e" stroke="#ffd700" stroke-width="1"/>

  <!-- MARCAJ PE VÂRFUL ACULUI NORD (N) -->
  <polygon points="200,165 198,172 202,172" fill="white" stroke="#d32f2f" stroke-width="0.5"/>

  <!-- TEXT INFORMATII LA BAZĂ -->
  <rect x="60" y="440" width="280" height="50" fill="#f5f5f5" stroke="#999" stroke-width="1" rx="4"/>
  <text x="200" y="458" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Vârful ROȘU indică NORDUL MAGNETIC</text>
  <text x="200" y="477" font-size="10" text-anchor="middle" fill="#666">Busola se utilizează pentru orientare în natură</text>

  <!-- LEGENDĂ SIMPLĂ -->
  <g id="legend" transform="translate(70, 85)">
    <!-- Roșu = Nord -->
    <rect x="0" y="0" width="8" height="8" fill="#ff6b6b" stroke="#d32f2f" stroke-width="0.5"/>
    <text x="12" y="7" font-size="9" fill="#333">Polul Nord (roșu) → Nord Magnetic</text>

    <!-- Albastru = Sud -->
    <rect x="0" y="15" width="8" height="8" fill="#4fc3f7" stroke="#0277bd" stroke-width="0.5"/>
    <text x="12" y="22" font-size="9" fill="#333">Polul Sud (albastru) → Sud Magnetic</text>
  </g>

  <!-- INDICATOR CĂ E MAGNETIC -->
  <circle cx="360" cy="100" r="20" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="360" y="105" font-size="12" font-weight="bold" text-anchor="middle" fill="#ff6b6b">MAGNETIC</text>
</svg>
