<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient pentru Pământ -->
    <radialGradient id="earthGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#01579b;stop-opacity:1" />
    </radialGradient>

    <!-- Gradient pentru liniile de câmp magnetic -->
    <linearGradient id="fieldLineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.2" />
    </linearGradient>

    <!-- Marker pentru săgeți -->
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff6b6b" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4fc3f7" />
    </marker>
  </defs>

  <!-- TITLU -->
  <text x="300" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a2e">
    Magnetismul Terestru
  </text>

  <!-- PĂMÂNT (Sfera) -->
  <circle cx="300" cy="300" r="120" fill="url(#earthGradient)" stroke="#0277bd" stroke-width="3"/>

  <!-- PARALELE ȘI MERIDIANE (ușor vizibile) -->
  <circle cx="300" cy="300" r="120" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <ellipse cx="300" cy="300" rx="120" ry="40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- NUCLEU PĂMÂNT (Magnet intern) -->
  <!-- Bară magnetică în interior -->
  <rect x="280" y="240" width="40" height="120" fill="#ff6b6b" opacity="0.8" rx="4"/>
  <text x="290" y="285" font-size="12" font-weight="bold" fill="white" text-anchor="start">S</text>
  <text x="290" y="350" font-size="12" font-weight="bold" fill="white" text-anchor="start">N</text>

  <!-- POLII GEOGRAFICI (linii verticale) -->
  <!-- Pol Nord Geographic -->
  <line x1="300" y1="175" x2="300" y2="155" stroke="#1976d2" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="300" cy="155" r="5" fill="#1976d2"/>
  <text x="315" y="160" font-size="14" font-weight="bold" fill="#1976d2">Nord Geographic</text>

  <!-- Pol Sud Geographic -->
  <line x1="300" y1="425" x2="300" y2="445" stroke="#1976d2" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="300" cy="445" r="5" fill="#1976d2"/>
  <text x="315" y="450" font-size="14" font-weight="bold" fill="#1976d2">Sud Geographic</text>

  <!-- POLII MAGNETICI (linii ușor înclinate) -->
  <!-- Pol Nord Magnetic (partea de SUD a magnetului, atrage polul N) -->
  <line x1="300" y1="175" x2="285" y2="155" stroke="#ff6b6b" stroke-width="3"/>
  <circle cx="285" cy="155" r="5" fill="#ff6b6b"/>
  <text x="250" y="140" font-size="12" font-weight="bold" fill="#ff6b6b">Pol Nord Magnetic</text>
  <text x="250" y="155" font-size="10" fill="#ff6b6b">(Polul S al magnetului)</text>

  <!-- Pol Sud Magnetic (partea de NORD a magnetului, atrage polul S) -->
  <line x1="300" y1="425" x2="315" y2="445" stroke="#ff6b6b" stroke-width="3"/>
  <circle cx="315" cy="445" r="5" fill="#ff6b6b"/>
  <text x="335" y="450" font-size="12" font-weight="bold" fill="#ff6b6b">Pol Sud Magnetic</text>
  <text x="335" y="465" font-size="10" fill="#ff6b6b">(Polul N al magnetului)</text>

  <!-- LINIILE DE CÂMP MAGNETIC (curbate) -->
  <!-- Linie stânga sus -->
  <path d="M 100 200 Q 150 150 200 120 Q 250 100 285 155" 
        fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6" marker-end="url(#arrowRed)"/>
  
  <!-- Linie stânga jos -->
  <path d="M 100 400 Q 150 450 200 480 Q 250 500 315 445" 
        fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6" marker-end="url(#arrowRed)"/>

  <!-- Linie dreapta sus -->
  <path d="M 500 200 Q 450 150 400 120 Q 350 100 315 155" 
        fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6" marker-end="url(#arrowRed)"/>

  <!-- Linie dreapta jos -->
  <path d="M 500 400 Q 450 450 400 480 Q 350 500 285 445" 
        fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6" marker-end="url(#arrowRed)"/>

  <!-- Linii suplimentare mai dese -->
  <path d="M 120 250 Q 160 200 220 160 Q 260 130 285 155" 
        fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>
  
  <path d="M 120 350 Q 160 400 220 440 Q 260 470 315 445" 
        fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>

  <path d="M 480 250 Q 440 200 380 160 Q 340 130 315 155" 
        fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>

  <path d="M 480 350 Q 440 400 380 440 Q 340 470 285 445" 
        fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>

  <!-- LEGENDĂ -->
  <g id="legend">
    <!-- Pol Nord Geographic -->
    <line x1="50" y1="510" x2="70" y2="510" stroke="#1976d2" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="80" y="515" font-size="12" fill="#1976d2" font-weight="bold">Poli Geografici</text>

    <!-- Pol Nord Magnetic -->
    <line x1="50" y1="535" x2="70" y2="535" stroke="#ff6b6b" stroke-width="3"/>
    <text x="80" y="540" font-size="12" fill="#ff6b6b" font-weight="bold">Poli Magnetici</text>

    <!-- Linii de câmp -->
    <path d="M 50 560 Q 60 555 70 560" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)"/>
    <text x="80" y="565" font-size="12" fill="#ff6b6b" font-weight="bold">Linii de câmp magnetic</text>
  </g>

  <!-- NOTĂ IMPORTANTĂ -->
  <rect x="30" y="50" width="540" height="60" fill="#fff3cd" stroke="#ff9800" stroke-width="2" rx="4" opacity="0.95"/>
  <text x="50" y="70" font-size="13" font-weight="bold" fill="#e65100">⚠️ Observație importantă:</text>
  <text x="50" y="88" font-size="12" fill="#e65100">
    Polul Nord al magnetului terestru (din interior) se află la SUD geografic!
  </text>
  <text x="50" y="104" font-size="12" fill="#e65100">
    De aceea polul Nord magnetic (imens) atrage polul Sud al acului busolei.
  </text>
</svg>
