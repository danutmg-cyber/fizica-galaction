<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test interactiv – Concepte de bază în fizică</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h1, h2 {
      text-align: center;
    }

    .question {
      background: #1e293b;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      margin-top: 20px;
      cursor: pointer;
    }

    #rezultat {
      margin-top: 20px;
      font-size: 20px;
      text-align: center;
    }

    .corect { color: #22c55e; }
    .gresit { color: #ef4444; }

    .quote {
      text-align: center;
      margin-bottom: 20px;
      font-style: italic;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🧪 Test interactiv</h1>
  <h2>Concepte de bază – Clasa a VI-a</h2>

  <p class="quote">„Fizica nu este o materie dominată de formule, ci de logică”</p>

  <!-- Întrebări -->
  <div class="question">
    1. Un fenomen fizic este:
    <select id="q1">
      <option value="">Alege...</option>
      <option value="0">O unitate de măsură</option>
      <option value="1">O transformare observabilă</option>
      <option value="0">Un instrument</option>
    </select>
  </div>

  <div class="question">
    2. Unitatea pentru lungime este:
    <input type="text" id="q2">
  </div>

  <div class="question">
    3. Timpul se măsoară în:
    <select id="q3">
      <option value="">Alege...</option>
      <option value="0">kg</option>
      <option value="1">s</option>
      <option value="0">m</option>
    </select>
  </div>

  <div class="question">
    4. 2 m = ? cm
    <input type="number" id="q4">
  </div>

  <div class="question">
    5. 500 cm = ? m
    <input type="number" id="q5">
  </div>

  <div class="question">
    6. 1 kg = ? g
    <input type="number" id="q6">
  </div>

  <button onclick="verifica()">Verifică</button>

  <div id="rezultat"></div>

</div>

<script>
function verifica() {
  let scor = 0;
  let total = 6;

  // q1
  if (document.getElementById("q1").value == "1") scor++;

  // q2
  let q2 = document.getElementById("q2").value.toLowerCase();
  if (q2 == "m" || q2 == "metru") scor++;

  // q3
  if (document.getElementById("q3").value == "1") scor++;

  // numeric (cu toleranță)
  function ok(val, corect) {
    return Math.abs(val - corect) < 0.15;
  }

  if (ok(parseFloat(q4.value), 200)) scor++;
  if (ok(parseFloat(q5.value), 5)) scor++;
  if (ok(parseFloat(q6.value), 1000)) scor++;

  // nota
  let nota = (scor / total) * 10;

  let feedback = "";

  if (nota < 5) feedback = "Revezi noțiunile de bază.";
  else if (nota < 8) feedback = "Bine, dar mai exersează.";
  else feedback = "Foarte bine!";

  document.getElementById("rezultat").innerHTML =
    "Scor: " + scor + "/" + total +
    "<br>Nota: " + nota.toFixed(2) +
    "<br>" + feedback;
}
</script>

</body>
</html>
