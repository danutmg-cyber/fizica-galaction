<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul distanță focală - GeoGebra</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Elimină scroll-ul paginii părinte */
            background-color: #f9f9f9;
        }
        .geogebra-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Ocupă toată înălțimea vizibilă a ecranului */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="geogebra-container">
        <iframe 
            scrolling="no" 
            title="Calcul distanta focala stiind x1 si distanta obiect-imagine" 
            src="https://www.geogebra.org/material/iframe/id/vqbmjwth/width/1522/height/787/border/888888/sfsb/true/smb/false/stb/false/stbh/false/ai/false/asb/false/sri/false/rc/false/ld/false/sdz/true/ctl/false" 
            allowfullscreen="true"
            webkitallowfullscreen="true" 
            mozallowfullscreen="true"
            allow="autoplay; fullscreen">
        </iframe>
    </div>

</body>
</html>
