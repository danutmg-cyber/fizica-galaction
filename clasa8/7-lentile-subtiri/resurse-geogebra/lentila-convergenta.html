<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formarea imaginii în lentila convergentă - GeoGebra</title>
    <style>
        /* Eliminăm marginile și scroll-ul inutil pentru o integrare perfectă */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        .geogebra-wrapper {
            position: relative;
            width: 100%;
            height: 100vh; /* Ocupă întreaga înălțime a ferestrei */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="geogebra-wrapper">
        <iframe 
            scrolling="no" 
            title="Formarea imaginii în lentila convergentă" 
            src="https://www.geogebra.org/material/iframe/id/dhrcff4k/width/1536/height/742/border/888888/sfsb/true/smb/false/stb/false/stbh/false/ai/false/asb/false/sri/false/rc/false/ld/false/sdz/true/ctl/false" 
            allowfullscreen="true"
            webkitallowfullscreen="true" 
            mozallowfullscreen="true"
            allow="autoplay; fullscreen">
        </iframe>
    </div>

</body>
</html>
