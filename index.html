<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizică - Gala Galaction</title>
    <style>
        /* Aceasta este partea care lipseste in imaginea dvs. */
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #334155; max-width: 450px; width: 100%; }
        h1 { color: var(--text); margin-bottom: 5px; font-size: 1.8rem; }
        .prof-name { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        p { color: #94a3b8; margin-bottom: 20px; font-size: 1rem; }
        .btn-test { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            margin: 15px 0; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            transition: 0.3s; 
            font-size: 1.1rem;
            box-sizing: border-box;
            border: none;
        }
        .btn-test:hover { transform: translateY(-3px); background: #1d4ed8; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
        .btn-test small { display: block; font-weight: normal; font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
        .footer { margin-top: 25px; font-size: 0.8rem; color: #64748b; letter-spacing: 1px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Evaluare Fizică</h1>
        <div class="prof-name">Prof. DĂNUȚ ANDRONIE</div>
        
        <p>Alege testul corespunzător clasei tale:</p>
        
        <a href="Fenomene-termice.html" class="btn-test">
            CLASA a VI-a
            <small>Fenomene Termice</small>
        </a>
        
        <a href="Energia-mecanica.html" class="btn-test">
            CLASA a VII-a
            <small>Energia Mecanică</small>
        </a>

        <a href="Fenomene-optice.html" class="btn-test" style="background: #7c3aed;">
            CLASA a VIII-a
            <small>Fenomene Optice</small>
        </a>

        <div class="footer">
            🏫 Școala Gimnazială "Gala Galaction"<br>
            Mangalia
        </div>
    </div>

</body>
</html>
