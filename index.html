<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIZICĂ - GALA GALACTION</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .header { text-align: center; width: 100%; max-width: 700px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .school-name { font-size: 1.1rem; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .container { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .question-box { font-size: 1.25rem; font-weight: 500; margin-bottom: 20px; text-align: center; min-height: 60px; line-height: 1.5; }
        .option-btn { background: #2d3748; border: 2px solid #4a5568; padding: 14px; border-radius: 12px; cursor: pointer; color: white; font-size: 1rem; transition: 0.2s; width: 100%; margin-bottom: 8px; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #334155; }
        input[type="text"], input[type="number"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #4a5568; background: #0f172a; color: white; font-size: 1.2rem; text-align: center; margin-bottom: 10px; }
        .check-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 12px; display: none; text-align: center; font-weight: bold; }
        .next-btn { width: 100%; background: #475569; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        .hidden { display: none; }
        .score-display { font-size: 4rem; color: var(--accent); font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="school-name">ȘCOALA GIMNAZIALĂ GALA GALACTION MANGALIA</div>
        <div style="font-size: 1rem; color: #94a3b8;">Prof. DĂNUȚ ANDRONIE</div>
    </div>

    <div class="container" id="screen-login">
        <h2 style="text-align:center">🏁 Test Fenomene Termice</h2>
        <input type="text" id="p-name" placeholder="Numele elevului">
        <select id="p-class" style="width:100%; padding:15px; margin: 15px 0; border-radius:12px; background:#0f172a; color:white; border: 2px solid #4a5568;">
            <option value="">Alege clasa...</option>
            <option value="6A">Clasa a VI-a A</option>
            <option value="6B">Clasa a VI-a B</option>
            <option value="6C">Clasa a VI-a C</option>
            <option value="6D">Clasa a VI-a D</option>
        </select>
        <button class="check-btn" onclick="startGame()">ÎNCEPE TESTUL (20 ÎNTREBĂRI)</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="q-info" style="color: var(--accent); font-weight: bold; margin-bottom: 10px; text-align: center;"></div>
        <div class="question-box" id="question"></div>
        <div id="input-area"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">CONTINUĂ ➡️</button>
    </div>

    <div class="container hidden" id="screen-end">
        <h2 style="text-align:center">Evaluare Finală</h2>
        <div class="score-display" id="final-score"></div>
        <p style="text-align:center; color: #94a3b8;" id="raw-points"></p>
        <button class="check-btn" onclick="location.reload()">REIA TESTUL</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRIy0kI7SsJ9e9bD_UT2aH4htyB8vvDF0PUBwPPodz3xWJHc9Abky2E7FuvWK-1QGA/exec"; 

    let state = { name: "", class: "", correctAnswers: 0, currentIdx: 0, questions: [] };

    const pool = [
        // FENOMENE DE TRECERE
        { q: "Trecerea din stare solidă în stare lichidă se numește:", type: "fill", a: ["topire"] },
        { q: "Trecerea din stare lichidă în stare solidă se numește:", type: "fill", a: ["solidificare"] },
        { q: "Trecerea din stare lichidă în stare gazoasă se numește:", type: "fill", a: ["vaporizare"] },
        { q: "Trecerea din stare gazoasă în stare lichidă se numește:", type: "fill", a: ["condensare"] },
        { q: "Trecerea din stare solidă direct în stare gazoasă:", type: "fill", a: ["sublimare"] },
        { q: "Trecerea din stare gazoasă direct în stare solidă:", type: "fill", a: ["desublimare"] },
        
        // TEMPERATURI FIXE
        { q: "La ce temperatură fierbe apa pură (la presiune normală)?", type: "choice", o: ["100°C", "0°C", "273K"], a: "100°C" },
        { q: "La ce temperatură se topește gheața pură?", type: "choice", o: ["0°C", "100°C", "-10°C"], a: "0°C" },
        { q: "La ce temperatură se solidifică apa pură?", type: "choice", o: ["0°C", "4°C", "100°C"], a: "0°C" },
        
        // RELATII TRANSFORMARE
        { q: "Relația de transformare din scara Celsius (t) în Kelvin (T) este:", type: "choice", o: ["T = t + 273,15", "T = t - 273,15", "T = t * 1,8"], a: "T = t + 273,15" },
        { q: "Relația de transformare din Celsius (t) în Fahrenheit (F) este:", type: "choice", o: ["F = t * 1,8 + 32", "F = t + 32", "F = (t-32)/1,8"], a: "F = t * 1,8 + 32" },

        // COMPLETARI
        { q: "........ este fenomenul termic în care corpul își mărește temperatura.", type: "fill", a: ["incalzirea", "încălzirea"] },
        { q: "........ este fenomenul termic în care corpul își micșorează temperatura.", type: "fill", a: ["racirea", "răcirea"] },
        { q: "Corpul cald ......... căldură celui rece și se răcește.", type: "fill", a: ["cedeaza", "cedează"] },
        { q: "Corpul rece ......... căldură de la corpul cald și se încălzește.", type: "fill", a: ["primeste", "primește"] },
        { q: "Transmiterea căldurii prin metale se face prin ...........", type: "fill", a: ["conductie", "conducție"] },
        { q: "Transmiterea căldurii în lichide și gaze se face prin ...........", type: "fill", a: ["convectie", "convecție"] },
        { q: "Transmiterea căldurii prin vid se face prin ...........", type: "fill", a: ["radiatie", "radiație"] },
        
        // DILATARE
        { q: "Solidele sub formă de bară (tije) prin încălzire își măresc ..........", type: "fill", a: ["lungimea"] },
        { q: "Solidele sub formă de plăci (subțiri) prin încălzire își măresc ..........", type: "fill", a: ["suprafata", "suprafața"] },
        { q: "Solidele sub formă de sferă (bilă) prin încălzire își măresc ..........", type: "fill", a: ["volumul"] },
        
        // STARI AGREGARE
        { q: "Apa în stare solidă are ........ și ......... (completează cu: formă / volum)", type: "choice", o: ["formă proprie și volum propriu", "formă variabilă", "volum propriu dar nu are formă"], a: "formă proprie și volum propriu" },
        { q: "Apa în stare lichidă nu are ........ proprie, dar are ........ propriu.", type: "choice", o: ["formă / volum", "volum / formă", "masă / volum"], a: "formă / volum" },
        { q: ".......... nu au nici formă nici volum propriu (se adaptează recipientului).", type: "fill", a: ["gazele", "starea gazoasa"] }
    ];

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function startGame() {
        state.name = document.getElementById('p-name').value;
        state.class = document.getElementById('p-class').value;
        if(state.name.length < 3 || !state.class) return alert("Introdu numele și clasa!");
        
        state.questions = shuffle([...pool]).slice(0, 20);
        state.correctAnswers = 0; state.currentIdx = 0;
        
        document.getElementById('screen-login').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = state.questions[state.currentIdx];
        document.getElementById('q-info').innerText = `Întrebarea ${state.currentIdx + 1} / 20`;
        document.getElementById('question').innerText = q.q;
        const area = document.getElementById('input-area');
        area.innerHTML = '';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        if(q.type === 'choice') {
            shuffle([...q.o]).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAns(opt);
                area.appendChild(btn);
            });
        } else {
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'user-input';
            input.placeholder = "Scrie aici...";
            const btn = document.createElement('button');
            btn.className = 'check-btn';
            btn.innerText = 'VERIFICĂ';
            btn.onclick = () => checkAns(document.getElementById('user-input').value);
            area.appendChild(input);
            area.appendChild(btn);
        }
    }

    function checkAns(user) {
        const q = state.questions[state.currentIdx];
        let isCorrect = false;
        const clean = (s) => s ? s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "";
        
        if(q.type === 'fill') {
            isCorrect = q.a.some(ans => clean(user) === clean(ans));
        } else {
            isCorrect = user === q.a;
        }

        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(isCorrect) { 
            state.correctAnswers++; f.innerText = "Corect! ✅"; f.style.color = "#4ade80"; 
        } else { 
            f.innerText = `Răspunsul era: ${Array.isArray(q.a) ? q.a[0] : q.a} ❌`; f.style.color = "#f87171"; 
        }
        document.querySelectorAll('.option-btn, .check-btn').forEach(b => b.disabled = true);
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        state.currentIdx++;
        if(state.currentIdx < 20) showQuestion();
        else finishGame();
    }

    function finishGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        let nota = 1 + (state.correctAnswers * 0.45);
        document.getElementById('final-score').innerText = nota.toFixed(2);
        document.getElementById('raw-points').innerText = `Scor: ${state.correctAnswers} din 20 corecte.`;

        if(SCRIPT_URL !== "URL_SCRIPT_AICI") {
            const formData = new FormData();
            formData.append("nume", state.name);
            formData.append("clasa", state.class);
            formData.append("scor", nota.toFixed(2));
            fetch(SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' });
        }
    }
</script>
</body>
</html>
