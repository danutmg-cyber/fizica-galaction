<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizica - Gala Galaction</title>
    <style>
        :root { 
            --accent: #f59e0b; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc;
            /* Nuanțe Butoane */
            --cls6: #2563eb; /* Albastru Regal */
            --cls7: #1d4ed8; /* Albastru Intens */
            --cls8: #1e3a8a; /* Albastru Închis */
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        .header { 
            text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--accent); 
            padding-bottom: 15px; width: 100%; max-width: 800px; 
        }
        .header h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; }
        .header h2 { margin: 5px 0; font-size: 1.3rem; color: #cbd5e1; }
        .motto { font-style: italic; font-size: 0.85rem; color: var(--accent); margin-top: 5px; }

        .container { width: 100%; max-width: 800px; }
        .class-section { margin-bottom: 15px; border-radius: 10px; overflow: hidden; background: var(--card); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        
        /* Stiluri specifice pentru butoanele claselor */
        .class-trigger { 
            width: 100%; padding: 22px; color: white; border: none; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center; transition: filter 0.2s;
        }
        .btn-vi { background: var(--cls6); }
        .btn-vii { background: var(--cls7); }
        .btn-viii { background: var(--cls8); }
        .class-trigger:hover { filter: brightness(1.1); }
        
        .active .class-trigger { border-bottom: 3px solid var(--accent); }
        
        .test-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; display: flex; flex-direction: column; }
        .active .test-list { max-height: 1000px; }

        .test-btn { 
            padding: 16px 25px; color: #e2e8f0; border: none; border-bottom: 1px solid #334155;
            background: none; text-align: left; width: 100%; font-size: 1rem; cursor: pointer; transition: 0.2s;
        }
        .test-btn:hover { background: #334155; color: var(--accent); padding-left: 35px; }
        .final { font-weight: bold; color: #f87171 !important; border-left: 4px solid #ef4444; }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--card); padding: 30px; border-radius: 12px; border: 2px solid var(--accent);
            width: 90%; max-width: 380px; text-align: center;
        }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #475569;
            background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box;
        }
        .btn-start {
            background: var(--accent); color: #000; border: none; padding: 15px;
            font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ȘCOALA GIMNAZIALĂ "GALA GALACTION" MANGALIA</h1>
        <h2>Prof. DĂNUȚ ANDRONIE</h2>
        <div class="motto">"FIZICA NU ESTE DOMINATĂ DE FORMULE CI DE LOGICĂ"</div>
    </div>

    <div class="container">
        <div class="class-section">
            <button class="class-trigger btn-vi" onclick="toggleClasa(this)">CLASA A VI-A <span>⊕</span></button>
            <div class="test-list">
                <button class="test-btn" onclick="pregatesteTest('antrenament/Concepte-baza-6.html', 'VI')">1. CONCEPTE DE BAZĂ ÎN FIZICĂ</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Unitati-SI.html', 'VI')">2. UNITĂȚI DE MĂSURĂ</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Fenomene-mecanice-6.html', 'VI')">3. FENOMENE MECANICE</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Fenomene-termice-6.html', 'VI')">4. FENOMENE TERMICE</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Fenomene-electrice.html', 'VI')">5. FENOMENE ELECTRICE ȘI MAGNETICE</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Optica-Reflexie-Refractie.html', 'VI')">6. FENOMENE OPTICE</button>
                <button class="test-btn final" onclick="pregatesteTest('antrenament/Evaluare-Finala-6.html', 'VI')">7. TEST DE EVALUARE FINALĂ</button>
            </div>
        </div>

        <div class="class-section">
            <button class="class-trigger btn-vii" onclick="toggleClasa(this)">CLASA A VII-A <span>⊕</span></button>
            <div class="test-list">
                <button class="test-btn" onclick="pregatesteTest('antrenament/Concepte-baza-7.html', 'VII')">1. CONCEPTE DE BAZĂ ÎN FIZICĂ</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Interactiuni-7.html', 'VII')">2. INTERACȚIUNI</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Lucrul-mecanic-7.html', 'VII')">3. LUCRUL MECANIC</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Energia-mecanica.html', 'VII')">4. ENERGIA MECANICĂ</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Echilibrul-corpurilor.html', 'VII')">5. ECHILIBRUL CORPURILOR</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Statica-fluidelor-7.html', 'VII')">6. STATICA FLUIDELOR</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Unde-mecanice-7.html', 'VII')">7. UNDE MECANICE</button>
                <button class="test-btn final" onclick="pregatesteTest('antrenament/Evaluare-Finala-7.html', 'VII')">8. TEST DE EVALUARE FINALĂ</button>
            </div>
        </div>

        <div class="class-section">
            <button class="class-trigger btn-viii" onclick="toggleClasa(this)">CLASA A VIII-A <span>⊕</span></button>
            <div class="test-list">
                <button class="test-btn" onclick="pregatesteTest('antrenament/Fenomene-termice-8.html', 'VIII')">1. FENOMENE TERMICE</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Electrostatica-8.html', 'VIII')">2. ELECTROSTATICA</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Electrocinetica-8.html', 'VIII')">3. ELECTROCINETICA</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Efectul-magnetic-8.html', 'VIII')">4. EFECTUL MAGNETIC AL CURENTULUI</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Optica-Reflexie-Refractie.html', 'VIII')">5. REFLEXIA-REFRACȚIA</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Lentile-Subtiri-8.html', 'VIII')">6. LENTILE SUBȚIRI</button>
                <button class="test-btn" onclick="pregatesteTest('antrenament/Energia-si-Viata-8.html', 'VIII')">7. ENERGIA ȘI VIAŢA</button>
                <button class="test-btn final" onclick="pregatesteTest('antrenament/Evaluare-Finala-8.html', 'VIII')">8. EVALUARE FINALĂ</button>
            </div>
        </div>
    </div>

    <div id="modalNume" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--accent); margin-top:0;">Identificare Elev</h3>
            <input type="text" id="numeElev" placeholder="Nume și Prenume">
            <select id="selectClasa"></select>
            <button class="btn-start" onclick="incepeTestul()">ÎNCEPE TESTUL</button>
            <p onclick="inchideModal()" style="cursor:pointer; color:gray; margin-top:15px; font-size:0.9rem;">Anulează</p>
        </div>
    </div>

    <script>
        let testDestinatie = "";
        let modalActiv = false;

        function toggleClasa(element) {
            element.parentElement.classList.toggle('active');
        }

        function pregatesteTest(url, clasa) {
            if(modalActiv) return;
            modalActiv = true;
            testDestinatie = url;
            const select = document.getElementById('selectClasa');
            select.innerHTML = "";
            ['A', 'B', 'C', 'D'].forEach(litera => {
                let opt = document.createElement('option');
                opt.value = `Clasa a ${clasa}-a ${litera}`;
                opt.textContent = `Clasa a ${clasa}-a ${litera}`;
                select.appendChild(opt);
            });
            document.getElementById('modalNume').style.display = "flex";
        }

        function inchideModal() {
            document.getElementById('modalNume').style.display = "none";
            modalActiv = false;
        }

        function incepeTestul() {
            const nume = document.getElementById('numeElev').value.trim();
            const clasa = document.getElementById('selectClasa').value;
            if(nume.length < 3) { alert("Introdu numele tău complet."); return; }
            window.location.href = testDestinatie + "?nume=" + encodeURIComponent(nume) + "&clasa=" + encodeURIComponent(clasa);
        }
    </script>
</body>
</html>
