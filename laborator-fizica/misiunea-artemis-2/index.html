<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misiunea Artemis II – Prof. Dănuț Andronie</title>
    <style>
        :root {
            --bg-color: #0B1D3A;
            --text-color: #FFFFFF;
            --accent-color: #FFD700;
            --card-bg: rgba(255, 255, 255, 0.05);
            --header-gradient: linear-gradient(135deg, #1e3a8a 0%, #0B1D3A 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 40px 20px;
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: var(--header-gradient);
            border-bottom: 2px solid var(--accent-color);
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .school-name {
            font-size: 0.9em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .professor-name {
            font-size: 1.1em;
            margin-top: 5px;
            opacity: 0.9;
        }

        .container {
            max-width: 850px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { margin: 10px 0; font-size: 2.2em; color: var(--accent-color); }
        h2 { color: var(--accent-color); border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }

        .simulator-box {
            text-align: center;
            background: #000;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #333;
        }

        svg { max-width: 100%; height: auto; }

        .controls {
            margin-top: 20px;
            padding: 25px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
        }

        input[type=range] {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #222;
            outline: none;
            cursor: pointer;
            accent-color: var(--accent-color);
            margin: 20px 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bar-container {
            height: 120px;
            width: 35px;
            background: #111;
            margin: 10px auto;
            position: relative;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px currentColor;
        }

        .quiz-option {
            display: block;
            background: rgba(255,255,255,0.07);
            margin: 12px 0;
            padding: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .quiz-option:hover { 
            background: rgba(255,255,255,0.15); 
            transform: translateX(5px);
        }
        
        .correct { border-color: #00FF00 !important; background: rgba(0, 255, 0, 0.15) !important; color: #55ff55; }
        .wrong { border-color: #FF0000 !important; background: rgba(255, 0, 0, 0.15) !important; color: #ff5555; }

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            font-size: 0.85em;
            opacity: 0.7;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }

        @media (max-width: 600px) {
            .stats { grid-template-columns: 1fr; }
            .bar-container { height: 60px; width: 80%; }
            .bar { height: 100%; width: 0; bottom: auto; left: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="school-name">ȘCOALA GIMNAZIALĂ „GALA GALACTION”, MANGALIA</div>
    <div class="professor-name">Prof. Dănuț Andronie</div>
</header>

<div class="container" id="app">
    </div>

<footer>
    &copy; 2026 Resursă Educațională Digitală - Fizică și Astronomie<br>
    Creat pentru suport didactic - Misiunea Artemis II
</footer>

<script>
const lessonData = {
    "pages": [
        {
            "type": "header",
            "title": "🚀 Misiunea Artemis II: Drumul spre Lună",
            "content": "Analiza transformărilor de energie mecanică pe parcursul traiectoriei <i>free-return</i>."
        },
        {
            "type": "simulator",
            "title": "⚡ Simulator Interactiv Energie",
            "description": "Folosește cursorul de mai jos pentru a deplasa capsula. Observă cum <b>Energia Mecanică (Em)</b> se conservă după oprirea motoarelor, deși viteza (Ec) și înălțimea (Ep) variază continuu.",
            "svg": `<svg id="main-svg" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="150" r="30" fill="#1E90FF"/><text x="50" y="150" text-anchor="middle" dy="5" fill="white" font-size="12" font-weight="bold">Pământ</text>
                <circle cx="550" cy="150" r="20" fill="#AAAAAA"/><text x="550" y="150" text-anchor="middle" dy="5" fill="white" font-size="10">Lună</text>
                <path id="traj" d="M50,150 C200,50 400,250 550,150" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="8,4" opacity="0.4"/>
                <circle id="capsula" cx="50" cy="150" r="9" fill="#FF4500" stroke="white" stroke-width="2"/>
            </svg>`
        },
        {
            "type": "quiz",
            "title": "🧠 Verificarea Conceptelor",
            "question": "Conform legii conservării energiei, ce se întâmplă cu suma dintre Ec și Ep în sistemul izolat al capsulei?",
            "options": [
                { "text": "Suma variază în funcție de distanța față de Lună", "correct": false },
                { "text": "Suma rămâne constantă (Energia Mecanică se conservă)", "correct": true },
                { "text": "Energia mecanică scade pe măsură ce capsula urcă", "correct": false }
            ]
        }
    ]
};

function initApp() {
    const app = document.getElementById('app');
    
    lessonData.pages.forEach((page) => {
        const section = document.createElement('div');
        section.className = 'card';
        
        if(page.type === 'header') {
            section.innerHTML = `<h1>${page.title}</h1><p style="font-size:1.2em; line-height:1.6; opacity:0.9;">${page.content}</p>`;
        } 
        
        else if(page.type === 'simulator') {
            section.innerHTML = `
                <h2>${page.title}</h2>
                <p>${page.description}</p>
                <div class="simulator-box">${page.svg}</div>
                <div class="controls">
                    <label style="font-weight:bold; color:var(--accent-color)">Evoluția Misiunii: <span id="val-pos">0</span>% din traseu</label>
                    <input type="range" id="rocket-slider" min="0" max="100" value="0">
                    <div class="stats">
                        <div class="stat-item">
                            <div class="bar-container"><div id="bar-ec" class="bar" style="background:#FF4B2B; color:#FF4B2B; height:0%"></div></div>
                            <strong>Ec</strong><br><small>(Cinetică)</small><br><span id="num-ec">0</span>
                        </div>
                        <div class="stat-item">
                            <div class="bar-container"><div id="bar-ep" class="bar" style="background:#448AFF; color:#448AFF; height:0%"></div></div>
                            <strong>Ep</strong><br><small>(Potențială)</small><br><span id="num-ep">0</span>
                        </div>
                        <div class="stat-item">
                            <div class="bar-container" style="border-color:var(--accent-color)"><div id="bar-em" class="bar" style="background:#FFD700; color:#FFD700; height:0%"></div></div>
                            <strong>Em</strong><br><small>(Mecanică)</small><br><span id="num-em">0</span>
                        </div>
                    </div>
                </div>
            `;
        }

        else if(page.type === 'quiz') {
            section.innerHTML = `<h2>${page.title}</h2><p style="font-size:1.1em; margin-bottom:20px;">${page.question}</p>`;
            page.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    const parent = btn.parentElement;
                    parent.querySelectorAll('.quiz-option').forEach(b => b.className = 'quiz-option');
                    if(opt.correct) btn.classList.add('correct');
                    else btn.classList.add('wrong');
                };
                section.appendChild(btn);
            });
        }

        app.appendChild(section);
    });

    setupSimulator();
}

function setupSimulator() {
    const slider = document.getElementById('rocket-slider');
    const capsula = document.getElementById('capsula');
    const path = document.getElementById('traj');
    if(!slider) return;

    const pathLength = path.getTotalLength();

    slider.addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        document.getElementById('val-pos').innerText = val;

        const point = path.getPointAtLength((val / 100) * pathLength);
        capsula.setAttribute('cx', point.x);
        capsula.setAttribute('cy', point.y);

        let ec, ep, em;
        
        if(val <= 20) { // Faza de accelerare initiala
            ec = val * 5; 
            ep = val * 2;
            em = ec + ep;
        } else { // Faza de conservare (motoare oprite)
            em = 140; 
            if(val <= 70) { // Urcare spre punctul de echilibru
                ep = 40 + (val - 20) * 1.6; 
                ec = em - ep;
            } else { // Atractia Lunii incepe sa domine
                ep = 120 - (val - 70) * 1.2;
                ec = em - ep;
            }
        }

        updateBar('ec', ec);
        updateBar('ep', ep);
        updateBar('em', em);
    });
}

function updateBar(id, val) {
    const bar = document.getElementById(`bar-${id}`);
    const num = document.getElementById(`num-${id}`);
    const percent = Math.min((val / 160) * 100, 100);
    
    if(window.innerWidth > 600) {
        bar.style.height = percent + '%';
        bar.style.width = '100%';
    } else {
        bar.style.width = percent + '%';
        bar.style.height = '100%';
    }
    num.innerText = Math.round(val);
}

window.onload = initApp;
</script>
</body>
</html>
